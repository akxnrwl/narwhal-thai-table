# Netlify configuration for Narwhal Thai Table (Next.js 15 App Router)
#
# Tells Netlify to use the official Next.js Runtime plugin which wires up
# routing, edge functions, and image optimization automatically. Without
# it, Netlify treats `.next/` as a static folder and every route 404s.

[build]
  command = "npm run build"
  publish = ".next"

  [[plugins]]
    package = "@netlify/plugin-nextjs"

# Serve the gated /os command-center (static file public/os.html) at a clean URL
[[redirects]]
  from = "/os"
  to = "/os.html"
  status = 200
