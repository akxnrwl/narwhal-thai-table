        const pulse = 1 + Math.sin(state.clock * 5 + entity.phase) * 0.035;
        const r = entity.r * pulse;
        ctx.save();
        ctx.translate(entity.x, entity.y);
        ctx.globalAlpha = 0.96;

        const style = bubbleStyle(entity.type);
        ctx.fillStyle = style.fill;
        ctx.strokeStyle = style.stroke;
        ctx.lineWidth = entity.type === "comet" ? 3 : 2;
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        ctx.globalAlpha = 0.78;
        ctx.fillStyle = "#ffffff";
        ctx.beginPath();
        ctx.arc(-r * 0.34, -r * 0.36, Math.max(3, r * 0.18), 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;

        drawBubbleIcon(entity.type, r);
        ctx.restore();
      }

      function bubbleStyle(type) {
        if (type === "gold" || type === "comet") return { fill: "rgba(255, 224, 164, 0.78)", stroke: "rgba(201, 77, 36, 0.46)" };
        if (type === "star") return { fill: "rgba(255, 250, 214, 0.74)", stroke: "rgba(138, 90, 0, 0.36)" };
        if (type === "mini") return { fill: "rgba(226, 255, 209, 0.76)", stroke: "rgba(55, 137, 70, 0.44)" };
        if (type === "pearl") return { fill: "rgba(255, 255, 255, 0.76)", stroke: "rgba(255, 159, 183, 0.54)" };
        if (type === "grow") return { fill: "rgba(255, 226, 147, 0.78)", stroke: "rgba(138, 90, 0, 0.34)" };
        if (type === "heart") return { fill: "rgba(255, 220, 230, 0.82)", stroke: "rgba(255, 93, 122, 0.58)" };
        if (type === "moon") return { fill: "rgba(210, 218, 255, 0.78)", stroke: "rgba(100, 112, 210, 0.5)" };
        if (type === "shield") return { fill: "rgba(217, 247, 255, 0.78)", stroke: "rgba(11, 111, 130, 0.48)" };
        if (type === "prism") return { fill: "rgba(255, 246, 184, 0.78)", stroke: "rgba(255, 123, 155, 0.5)" };
        if (type === "mirror") return { fill: "rgba(226, 216, 255, 0.78)", stroke: "rgba(94, 76, 164, 0.44)" };
        return { fill: "rgba(217, 247, 255, 0.66)", stroke: "rgba(255, 255, 255, 0.82)" };
      }

      function drawBubbleIcon(type, r) {
        if (type === "star") {
          drawPadThaiPlate(r);
        } else if (type === "gold" || type === "comet") {
          drawTomYumPot(r, type === "comet");
        } else if (type === "mini") {
          drawThaiBite(r);
        } else if (type === "pearl") {
          ctx.fillStyle = "#ff9fb7";
          ctx.beginPath();
          ctx.ellipse(0, 1, r * 0.38, r * 0.28, -0.22, 0, Math.PI * 2);
          ctx.fill();
        } else if (type === "grow") {
          ctx.fillStyle = "#7ee6d0";
          ctx.beginPath();
          ctx.arc(0, 0, r * 0.36, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#ff9fb7";
          ctx.beginPath();
          ctx.arc(r * 0.18, -r * 0.1, r * 0.09, 0, Math.PI * 2);
          ctx.fill();
        } else if (type === "heart") {
          drawHeart(0, 0, r * 0.42, "#ff5d7a", "rgba(23,50,77,0.28)");
        } else if (type === "moon") {
          ctx.fillStyle = "#4452b8";
          ctx.beginPath();
          ctx.arc(2, 0, r * 0.42, 0, Math.PI * 2);
          ctx.arc(10, -2, r * 0.42, 0, Math.PI * 2);
          ctx.fill("evenodd");
        } else if (type === "shield") {
          ctx.fillStyle = "#0b6f82";
          ctx.beginPath();
          ctx.moveTo(0, -r * 0.44);
          ctx.quadraticCurveTo(r * 0.42, -r * 0.2, r * 0.28, r * 0.22);
          ctx.quadraticCurveTo(0, r * 0.48, -r * 0.28, r * 0.22);
          ctx.quadraticCurveTo(-r * 0.42, -r * 0.2, 0, -r * 0.44);
          ctx.fill();
        } else if (type === "mirror") {
          ctx.strokeStyle = "#6c5cc0";
          ctx.lineWidth = 2.4;
          ctx.beginPath();
          ctx.moveTo(-r * 0.26, -r * 0.38);
          ctx.lineTo(r * 0.28, -r * 0.14);
          ctx.lineTo(-r * 0.1, r * 0.38);
          ctx.stroke();
        } else {
          drawStar(0, 0, r * 0.52, r * 0.25, type === "prism" ? "#ff7b9b" : type === "gold" || type === "comet" ? "#fff7c7" : "#ffd166");
        }
      }

      function drawPadThaiPlate(r) {
        ctx.save();
        ctx.fillStyle = "#ffffff";
        ctx.strokeStyle = "rgba(23,50,77,0.22)";
        ctx.lineWidth = 1.4;
        ctx.beginPath();
        ctx.ellipse(0, 2, r * 0.58, r * 0.38, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        ctx.strokeStyle = "#d9902f";
        ctx.lineWidth = 2.3;
        ctx.lineCap = "round";
        for (let i = -2; i <= 2; i += 1) {
          ctx.beginPath();
          ctx.moveTo(-r * 0.34, i * r * 0.06 + 2);
          ctx.quadraticCurveTo(0, -r * 0.16 + i * 1.2, r * 0.34, i * r * 0.05 + 2);
          ctx.stroke();
        }

        ctx.fillStyle = "#7ccf71";
        ctx.beginPath();
        ctx.ellipse(-r * 0.24, -r * 0.18, r * 0.16, r * 0.07, -0.55, 0, Math.PI * 2);
        ctx.ellipse(r * 0.26, -r * 0.13, r * 0.15, r * 0.065, 0.35, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#ff7b4f";
        ctx.beginPath();
        ctx.arc(r * 0.05, -r * 0.05, r * 0.09, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#ffe08a";
        ctx.beginPath();
        ctx.moveTo(-r * 0.48, r * 0.2);
        ctx.lineTo(-r * 0.25, r * 0.12);
        ctx.lineTo(-r * 0.33, r * 0.34);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }

      function drawTomYumPot(r, comet = false) {
        ctx.save();
        ctx.fillStyle = comet ? "#ff7b4f" : "#f05a3f";
        ctx.strokeStyle = "rgba(97, 42, 23, 0.36)";
        ctx.lineWidth = 1.6;
        roundRect(-r * 0.42, -r * 0.1, r * 0.84, r * 0.5, r * 0.16);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = "#fff1a8";
        ctx.beginPath();
        ctx.ellipse(0, -r * 0.11, r * 0.42, r * 0.16, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        ctx.strokeStyle = "#612a17";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(-r * 0.48, r * 0.08, r * 0.13, Math.PI * 0.42, Math.PI * 1.52);
        ctx.arc(r * 0.48, r * 0.08, r * 0.13, -Math.PI * 0.52, Math.PI * 0.58);
        ctx.stroke();

        ctx.fillStyle = "#7ccf71";
        ctx.beginPath();
        ctx.ellipse(-r * 0.16, -r * 0.19, r * 0.14, r * 0.055, -0.45, 0, Math.PI * 2);
        ctx.ellipse(r * 0.18, -r * 0.18, r * 0.13, r * 0.05, 0.55, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#ffffff";
        ctx.beginPath();
        ctx.arc(r * 0.03, -r * 0.11, r * 0.08, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#ffdc5d";
        ctx.beginPath();
        ctx.arc(-r * 0.28, -r * 0.13, r * 0.07, 0, Math.PI * 2);
        ctx.arc(r * 0.29, -r * 0.05, r * 0.055, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawThaiBite(r) {
        ctx.save();
        ctx.fillStyle = "#b8ef69";
        ctx.strokeStyle = "rgba(55, 137, 70, 0.42)";
        ctx.lineWidth = 1.3;
        ctx.beginPath();
        ctx.moveTo(0, -r * 0.45);
        ctx.lineTo(r * 0.42, r * 0.28);
        ctx.lineTo(-r * 0.42, r * 0.28);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = "#fff7c7";
        ctx.beginPath();
        ctx.arc(0, 0, r * 0.18, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "#ff5d4f";
        ctx.lineWidth = 2;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(r * 0.08, -r * 0.32);
        ctx.quadraticCurveTo(r * 0.42, -r * 0.2, r * 0.28, r * 0.13);
        ctx.stroke();
        ctx.restore();
      }

      function drawObstacle(entity) {
        if (entity.age < 0.72 || level().id >= 8) {
          ctx.save();
          ctx.translate(entity.x, entity.y);
          ctx.globalAlpha = entity.age < 0.72 ? 0.42 : 0.18;
          ctx.strokeStyle = "#ff9fb7";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(0, 0, entity.r + 10 + Math.sin(state.clock * 9) * 2, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        }
        if (entity.type === "reef") return drawReef(entity);
        if (entity.type === "whirlpool") return drawWhirlpool(entity);
        if (entity.type === "kelp") return drawKelp(entity);
        if (entity.type === "jelly") return drawJelly(entity);
        drawInk(entity);
      }

      function drawInk(entity) {
        ctx.save();
        ctx.translate(entity.x, entity.y);
        ctx.rotate(Math.sin(entity.age * 2) * 0.08);
        ctx.globalAlpha = 0.88;
        ctx.fillStyle = "#294965";
        ctx.beginPath();
        ctx.arc(-entity.r * 0.38, 0, entity.r * 0.58, 0, Math.PI * 2);
        ctx.arc(entity.r * 0.22, -entity.r * 0.17, entity.r * 0.72, 0, Math.PI * 2);
        ctx.arc(entity.r * 0.44, entity.r * 0.24, entity.r * 0.48, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 0.22;
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(-entity.r * 0.22, -entity.r * 0.14, entity.r * 0.76, 0.4, Math.PI * 1.36);
        ctx.stroke();
        ctx.restore();
      }

      function drawKelp(entity) {
        ctx.save();
        ctx.translate(entity.x, entity.y);
        ctx.strokeStyle = "#196f65";
        ctx.lineWidth = 8;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(0, entity.r);
        ctx.quadraticCurveTo(Math.sin(entity.age * 2) * 18, 0, Math.sin(entity.age * 2 + 1) * 8, -entity.r);
        ctx.stroke();
        ctx.fillStyle = "rgba(255,255,255,0.25)";
        ctx.beginPath();
        ctx.ellipse(8, -entity.r * 0.35, 9, 4, -0.6, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawJelly(entity) {
        ctx.save();
        ctx.translate(entity.x, entity.y);
        ctx.globalAlpha = 0.82;
        ctx.fillStyle = "#8d6fd1";
        ctx.beginPath();
        ctx.ellipse(0, -4, entity.r * 0.86, entity.r * 0.58, 0, Math.PI, Math.PI * 2);
        ctx.lineTo(entity.r * 0.65, 8);
        ctx.quadraticCurveTo(0, entity.r * 0.52, -entity.r * 0.65, 8);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.5)";
        ctx.lineWidth = 2;
        for (let i = -1; i <= 1; i += 1) {
          ctx.beginPath();
          ctx.moveTo(i * 9, 8);
          ctx.quadraticCurveTo(i * 11 + Math.sin(entity.age * 5 + i) * 8, 22, i * 8, 34);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawReef(entity) {
        ctx.save();
        ctx.translate(entity.x, entity.y);
        ctx.rotate(Math.sin(entity.age * 1.4) * 0.04);
        ctx.globalAlpha = 0.9;
        ctx.fillStyle = "#ff7b9b";
        for (let i = -2; i <= 2; i += 1) {
          const h = entity.r * randomSeed(entity.phase + i, 0.7, 1.2);
          ctx.beginPath();
          ctx.moveTo(i * entity.r * 0.26, entity.r * 0.55);
          ctx.quadraticCurveTo(i * entity.r * 0.18, -h * 0.25, i * entity.r * 0.36, -h);
          ctx.quadraticCurveTo(i * entity.r * 0.05, -h * 0.68, i * entity.r * -0.18, entity.r * 0.55);
          ctx.closePath();
          ctx.fill();
        }
        ctx.fillStyle = "rgba(255,255,255,0.32)";
        ctx.beginPath();
        ctx.arc(-entity.r * 0.28, -entity.r * 0.12, 3, 0, Math.PI * 2);
        ctx.arc(entity.r * 0.26, -entity.r * 0.28, 2.4, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawWhirlpool(entity) {
        ctx.save();
        ctx.translate(entity.x, entity.y);
        ctx.rotate(entity.age * 2.5);
        ctx.globalAlpha = 0.86;
        ctx.strokeStyle = "#294965";
        ctx.lineWidth = 4;
        for (let i = 0; i < 3; i += 1) {
          ctx.beginPath();
          ctx.arc(0, 0, entity.r * (0.42 + i * 0.25), i * 0.8, Math.PI * 1.45 + i * 0.8);
          ctx.stroke();
        }
        ctx.strokeStyle = "rgba(255,255,255,0.62)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, entity.r * 0.9, 0.2, Math.PI * 1.2);
        ctx.stroke();
        ctx.restore();
      }

      function randomSeed(seed, min, max) {
        const value = Math.sin(seed * 999) * 43758.5453;
        return min + (value - Math.floor(value)) * (max - min);
      }

      function drawParticles() {
        for (const p of state.particles) {
          const alpha = clamp(p.life / p.maxLife, 0, 1);
          ctx.save();
          ctx.globalAlpha = alpha;
          if (p.ring) {
            ctx.strokeStyle = p.color;
            ctx.lineWidth = 3 * alpha;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.stroke();
          } else if (p.shape === "star") {
            ctx.translate(p.x, p.y);
            ctx.rotate(p.angle || 0);
            drawStar(0, 0, p.r * 1.75 * alpha, p.r * 0.78 * alpha, p.color);
          } else if (p.shape === "heart") {
            drawHeart(p.x, p.y, p.r * alpha, p.color, "rgba(23,50,77,0.14)");
          } else {
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r * alpha, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.restore();
        }
      }

      function drawWhaleTrail() {
        if (whale.form !== "star" && whale.form !== "mirror") return;
        ctx.save();
        for (let i = whale.trail.length - 1; i >= 0; i -= 1) {
          const t = whale.trail[i];
          const alpha = t.life / 0.38 * 0.22;
          ctx.globalAlpha = alpha;
          ctx.fillStyle = whale.form === "mirror" ? "#d7c6ff" : "#ffd166";
          ctx.beginPath();
          ctx.ellipse(t.x - i * 0.5, t.y + 3, 36 * t.scale, 22 * t.scale, 0, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      function drawWhale() {
        const bob = Math.sin(state.clock * 3.1) * 2.2;
        const wag = Math.sin(state.clock * (state.combo >= 5 ? 11 : 7)) * 0.22;
        const blinkClosed = whale.blink < 0.12;
        const meta = FORM_META[whale.form] || FORM_META.classic;
        const s = whale.scale;

        ctx.save();
        ctx.translate(whale.x, whale.y + bob);
        ctx.rotate(whale.faceTilt);
        ctx.scale(s, s);

        if (whale.form !== "classic" || whale.shield > 0 || whale.invulnerable > 0 || state.combo >= 10) {
          ctx.save();
          if (whale.shield > 0) {
            ctx.globalAlpha = 0.28 + Math.sin(state.clock * 12) * 0.06;
            ctx.fillStyle = "rgba(95, 222, 255, 0.32)";
            ctx.beginPath();
            ctx.arc(0, 0, 67, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.globalAlpha = whale.invulnerable > 0 ? 0.28 + Math.sin(state.clock * 18) * 0.1 : whale.shield ? 0.82 : 0.34;
          ctx.strokeStyle = whale.invulnerable > 0 ? "rgba(255,255,255,0.95)" : whale.shield ? "rgba(84,225,255,0.98)" : meta.aura;
          ctx.lineWidth = whale.shield ? 7 : 3;
          ctx.beginPath();
          ctx.arc(0, 0, whale.shield ? 63 : 50, 0, Math.PI * 2);
          ctx.stroke();
          if (whale.shield > 0) {
            ctx.globalAlpha = 0.9;
            ctx.strokeStyle = "rgba(255,255,255,0.85)";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(0, 0, 72, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * (whale.shield / 3));
            ctx.stroke();
          }
          ctx.restore();
        }

        // v3: combo-tier halo — additive ring around the whole narwhal that
        // grows wider + warmer as the combo climbs. Sits BELOW the body
        // draw so the body cleanly overlaps it. Off-white at the Coastal
        // tier, brass-tinted at Royal, brass + sparkles at Aurora.
        const comboTier = state.combo >= 30 ? 3 : state.combo >= 15 ? 2 : state.combo >= 5 ? 1 : 0;
        if (comboTier > 0) {
          const tierColor = comboTier === 1 ? "rgba(245,240,230,0.36)"
                          : comboTier === 2 ? "rgba(212,179,106,0.5)"
                          : "rgba(212,179,106,0.78)";
          const tierRadius = comboTier === 1 ? 56 : comboTier === 2 ? 64 : 74;
          ctx.save();
          ctx.strokeStyle = tierColor;
          ctx.lineWidth = comboTier + 1;
          ctx.beginPath();
          ctx.arc(0, 0, tierRadius, 0, Math.PI * 2);
          ctx.stroke();
          if (comboTier === 3) {
            // Aurora sparkles orbiting the ring
            for (let i = 0; i < 6; i += 1) {
              const a = state.clock * 1.6 + i * Math.PI / 3;
              ctx.fillStyle = "rgba(212,179,106,0.9)";
              ctx.beginPath();
              ctx.arc(Math.cos(a) * 78, Math.sin(a) * 78, 2.6, 0, Math.PI * 2);
              ctx.fill();
            }
          }
          ctx.restore();
        }

        ctx.fillStyle = whale.form === "giant" ? "#58cfc2" : "#58c6d9";
        ctx.beginPath();
        ctx.moveTo(-35, 3);
        ctx.quadraticCurveTo(-64, -24 + wag * 22, -78, -34);
        ctx.quadraticCurveTo(-65, -15, -43, 2);
        ctx.quadraticCurveTo(-66, 23 - wag * 22, -78, 38);
        ctx.quadraticCurveTo(-56, 26, -35, 8);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = meta.body;
        ctx.beginPath();
        ctx.ellipse(0, 0, 47, 31, 0, 0, Math.PI * 2);
        ctx.fill();

        // Belly highlight — subtle pearl, not the harsh pastel of v2.
        ctx.fillStyle = "#f0f9ff";
        ctx.beginPath();
        ctx.ellipse(11, 11, 29, 14, -0.04, 0, Math.PI * 2);
        ctx.fill();

        // v3: pink cheeks removed (they pushed the narwhal into baby-toy
        // territory). The smile + eye sparkle below still keep the
        // character feeling alive, but without the kiddie blush.

        ctx.fillStyle = meta.fin;
        ctx.beginPath();
        ctx.moveTo(-9, 24);
        ctx.quadraticCurveTo(6, 44, 18, 19);
        ctx.quadraticCurveTo(4, 27, -9, 24);
        ctx.fill();

        ctx.save();
        ctx.translate(34, -21);
        ctx.rotate(-0.34);
        ctx.fillStyle = meta.horn;
        ctx.beginPath();
        ctx.moveTo(0, -10);
        ctx.lineTo(whale.form === "star" ? 48 : 38, 0);
        ctx.lineTo(0, 10);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = whale.form === "star" ? "#ff9f1c" : "#d4a93a";
        ctx.lineWidth = 2;
        for (let stripe = 7; stripe < (whale.form === "star" ? 42 : 33); stripe += 9) {
          ctx.beginPath();
          ctx.moveTo(stripe, -6);
          ctx.lineTo(stripe - 5, 6);
          ctx.stroke();
        }
        ctx.restore();

        ctx.strokeStyle = "#17324d";
        ctx.lineWidth = 2.2;
        if (blinkClosed) {
          ctx.beginPath();
          ctx.moveTo(17, -10);
          ctx.lineTo(26, -10);
          ctx.stroke();
        } else {
          ctx.fillStyle = "#17324d";
          ctx.beginPath();
          ctx.arc(22, -11, 3.5, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#ffffff";
          ctx.beginPath();
          ctx.arc(23, -12.5, 1.1, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.beginPath();
        if (whale.smile > 0) {
          ctx.moveTo(24, -1);
          ctx.quadraticCurveTo(30, 5, 38, -1);
        } else {
          ctx.moveTo(27, 0);
          ctx.quadraticCurveTo(31, 3, 36, 0);
        }
        ctx.stroke();

        if (state.mode === "victory") {
          drawCrown(1, -44);
        }
        ctx.restore();
      }

      function drawCrown(x, y) {
        ctx.save();
        ctx.translate(x, y);
        ctx.fillStyle = "#ffd166";
        ctx.beginPath();
        ctx.moveTo(-18, 12);
        ctx.lineTo(-14, -8);
        ctx.lineTo(-4, 5);
        ctx.lineTo(5, -12);
        ctx.lineTo(14, 5);
        ctx.lineTo(22, -8);
        ctx.lineTo(18, 12);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }

      function drawFloaters() {
        ctx.save();
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = "800 18px Noto Sans Thai, Segoe UI, sans-serif";
        for (const f of state.floaters) {
          const alpha = clamp(f.life, 0, 1);
          ctx.globalAlpha = alpha;
          ctx.strokeStyle = "rgba(255, 255, 255, 0.86)";
          ctx.lineWidth = 4;
          ctx.strokeText(f.text, f.x, f.y);
          ctx.fillStyle = f.color;
          ctx.fillText(f.text, f.x, f.y);
        }
        ctx.restore();
      }

      function drawCanvasHud() {
        const lv = level();
        const progress = clamp(state.levelScore / lv.goal, 0, 1);
        const hudY = 76;
        const hudW = CONFIG.width - 36;
        const progressX = 154;
        const progressW = Math.max(160, CONFIG.width - 296);
        const levelDotStart = CONFIG.width - 116;
        ctx.save();
        ctx.fillStyle = "rgba(217,247,255,0.46)";
        ctx.strokeStyle = "rgba(255,255,255,0.5)";
        ctx.lineWidth = 1;
        roundRect(18, hudY, hudW, 54, 8);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = "#17324d";
        ctx.font = "800 15px Noto Sans Thai, Segoe UI, sans-serif";
        ctx.fillText(`${lv.id}. ${lv.name}`, 32, hudY + 22);
        ctx.font = "700 12px Noto Sans Thai, Segoe UI, sans-serif";
        ctx.fillText(`${Math.floor(state.levelScore)} / ${lv.goal}`, 32, hudY + 42);

        ctx.fillStyle = "rgba(255,255,255,0.38)";
        roundRect(progressX, hudY + 31, progressW, 9, 5);
        ctx.fill();
        ctx.fillStyle = state.feverTimer > 0 ? "#ffd166" : "rgba(11,111,130,0.82)";
        roundRect(progressX, hudY + 31, progressW * progress, 9, 5);
        ctx.fill();

        for (let i = 0; i < LEVELS.length; i += 1) {
          const x = levelDotStart + i * 8.2;
          ctx.beginPath();
          ctx.arc(x, hudY + 36, i === state.levelIndex ? 4.2 : 3.1, 0, Math.PI * 2);
          ctx.fillStyle = i < state.levelIndex ? "#ffd166" : i === state.levelIndex ? "#ff9fb7" : "rgba(255,255,255,0.46)";
          ctx.fill();
        }
        drawStatusHeart(CONFIG.width - 68, hudY + 78);

        if (whale.form !== "classic" || whale.shield > 0 || state.feverTimer > 0) {
          const label = state.feverTimer > 0 ? "Fever" : whale.shield ? `Shield ${Math.ceil(whale.shield)}` : FORM_META[whale.form].label;
          ctx.fillStyle = "rgba(217,247,255,0.58)";
          roundRect(18, hudY + 66, 112, 28, 8);
          ctx.fill();
          ctx.fillStyle = whale.form === "star" || state.feverTimer > 0 ? "#8a5a00" : "#0b6f82";
          ctx.font = "800 13px Noto Sans Thai, Segoe UI, sans-serif";
          ctx.fillText(label, 31, hudY + 84);
        }

        if (state.timeLeft <= 10 && state.mode === "playing") {
          ctx.globalAlpha = 0.35 + Math.sin(state.clock * 12) * 0.16;
          ctx.strokeStyle = "#ff7b9b";
          ctx.lineWidth = 5;
          ctx.strokeRect(2, 2, CONFIG.width - 4, CONFIG.height - 4);
        }
        ctx.restore();
      }

      function drawStatusHeart(x, y) {
        ctx.save();
        const shielded = whale.shield > 0;
        ctx.fillStyle = shielded ? "rgba(217,247,255,0.86)" : "rgba(255,255,255,0.7)";
        ctx.strokeStyle = shielded ? "rgba(84,225,255,0.8)" : "rgba(23,50,77,0.12)";
        ctx.lineWidth = 1.4;
        roundRect(x - 47, y - 19, 94, 38, 8);
        ctx.fill();
        ctx.stroke();

        for (let i = 0; i < 3; i += 1) {
          const hx = x - 24 + i * 24;
          const active = i < state.lives;
          drawHeart(hx, y + 1, 7.5, active ? "#ff5d7a" : "rgba(23,50,77,0.16)", "rgba(23,50,77,0.24)");
        }

        if (shielded) {
          ctx.globalAlpha = 0.95;
          ctx.fillStyle = "rgba(84,225,255,0.22)";
          ctx.beginPath();
          ctx.arc(x + 39, y, 16, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "rgba(84,225,255,0.95)";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(x + 39, y, 16, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * (whale.shield / 3));
          ctx.stroke();
          ctx.fillStyle = "#0b6f82";
          ctx.font = "900 11px Noto Sans Thai, Segoe UI, sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(Math.ceil(whale.shield), x + 39, y + 4);
        }
        ctx.restore();
      }

      function drawHeart(x, y, size, fill, stroke) {
        ctx.save();
        ctx.translate(x, y);
        ctx.fillStyle = fill;
        ctx.strokeStyle = stroke;
        ctx.lineWidth = 1.4;
        ctx.beginPath();
        ctx.moveTo(0, size * 0.86);
        ctx.bezierCurveTo(-size * 1.28, size * 0.12, -size * 1.18, -size * 0.78, -size * 0.38, -size * 0.78);
        ctx.bezierCurveTo(-size * 0.02, -size * 0.78, 0, -size * 0.42, 0, -size * 0.28);
        ctx.bezierCurveTo(0, -size * 0.42, size * 0.02, -size * 0.78, size * 0.38, -size * 0.78);
        ctx.bezierCurveTo(size * 1.18, -size * 0.78, size * 1.28, size * 0.12, 0, size * 0.86);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      }

      function drawTransition() {
        if (state.transitionTimer <= 0) return;
        const alpha = clamp(state.transitionTimer, 0, 1);
        const cardW = Math.min(360, CONFIG.width - 72);
        const cardX = (CONFIG.width - cardW) / 2;
        const cardY = 226;
        ctx.save();
        ctx.globalAlpha = alpha * 0.72;
        const wash = ctx.createLinearGradient(0, 0, 0, CONFIG.height);
        wash.addColorStop(0, "rgba(236, 251, 255, 0.86)");
        wash.addColorStop(0.52, "rgba(139, 232, 220, 0.52)");
        wash.addColorStop(1, "rgba(61, 183, 212, 0.36)");
        ctx.fillStyle = wash;
        ctx.fillRect(0, 0, CONFIG.width, CONFIG.height);

        ctx.globalAlpha = alpha * 0.36;
        ctx.fillStyle = "#ffffff";
        ctx.beginPath();
        ctx.ellipse(CONFIG.width / 2, 188, 178, 30, 0, 0, Math.PI * 2);
        ctx.ellipse(CONFIG.width / 2, 362, 210, 36, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.globalAlpha = alpha;
        ctx.fillStyle = "rgba(255,255,255,0.78)";
        ctx.strokeStyle = "rgba(255,255,255,0.82)";
        ctx.lineWidth = 1.2;
        roundRect(cardX, cardY, cardW, 116, 8);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#17324d";
        ctx.textAlign = "center";
        ctx.font = "900 26px Noto Sans Thai, Segoe UI, sans-serif";
        ctx.fillText(state.transitionText, CONFIG.width / 2, cardY + 48);
        ctx.font = "800 15px Noto Sans Thai, Segoe UI, sans-serif";
        ctx.fillStyle = "#0b6f82";
        ctx.fillText(state.badgeText, CONFIG.width / 2, cardY + 78);
        ctx.restore();
      }

      function drawFlash() {
        ctx.save();
        ctx.globalAlpha = state.flash * 0.12;
        ctx.fillStyle = level().id >= 9 ? "#fff2cc" : "#17324d";
        ctx.fillRect(0, 0, CONFIG.width, CONFIG.height);
        ctx.restore();
      }

      function drawStar(cx, cy, outer, inner, color) {
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(-Math.PI / 2);
        ctx.fillStyle = color;
        ctx.beginPath();
        for (let i = 0; i < 10; i += 1) {
          const radius = i % 2 === 0 ? outer : inner;
          const angle = i * Math.PI / 5;
          const x = Math.cos(angle) * radius;
          const y = Math.sin(angle) * radius;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }

      function roundRect(x, y, w, h, r) {
        const rr = Math.min(r, w / 2, h / 2);
        ctx.beginPath();
        ctx.moveTo(x + rr, y);
        ctx.arcTo(x + w, y, x + w, y + h, rr);
        ctx.arcTo(x + w, y + h, x, y + h, rr);
        ctx.arcTo(x, y + h, x, y, rr);
        ctx.arcTo(x, y, x + w, y, rr);
        ctx.closePath();
      }

      function loop(timestamp) {
        if (!state.lastFrame) state.lastFrame = timestamp;
        const dt = Math.min((timestamp - state.lastFrame) / 1000, 0.033);
        state.lastFrame = timestamp;
        update(dt);
        render();
        requestAnimationFrame(loop);
      }

      function canvasPoint(event) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: (event.clientX - rect.left) * CONFIG.width / rect.width,
          y: (event.clientY - rect.top) * CONFIG.height / rect.height
        };
      }

      function setTargetFromPointer(event) {
        const point = canvasPoint(event);
        whale.targetX = clamp(point.x, 42, CONFIG.width - 42);
        whale.targetY = clamp(point.y, CONFIG.safeTop, CONFIG.height - CONFIG.safeBottom);
      }

      function drawPauseIcon(isPaused) {
        pauseIcon.innerHTML = isPaused
          ? '<path d="M8 5v14l11-7-11-7z"></path>'
          : '<path d="M8 5v14"></path><path d="M16 5v14"></path>';
        pauseBtn.setAttribute("aria-label", isPaused ? "เล่นต่อ" : "พักเกม");
        pauseBtn.setAttribute("title", isPaused ? "เล่นต่อ" : "พักเกม");
      }

      function drawSoundIcon() {
        soundIcon.innerHTML = state.muted
          ? '<path d="M4 10v4h4l5 4V6l-5 4H4z"></path><path d="M18 9l-5 5"></path><path d="M13 9l5 5"></path>'
          : '<path d="M4 10v4h4l5 4V6l-5 4H4z"></path><path d="M16 9.5a4 4 0 0 1 0 5"></path><path d="M18.5 7a8 8 0 0 1 0 10"></path>';
        soundBtn.setAttribute("aria-pressed", String(state.muted));
      }

      function unlockAudio() {
        if (!audioContext && window.AudioContext) audioContext = new AudioContext();
        if (audioContext && audioContext.state === "suspended") audioContext.resume();
      }

      function playTone(frequency, duration, type = "sine", gain = 0.03) {
        if (state.muted || !audioContext) return;
        const osc = audioContext.createOscillator();
        const amp = audioContext.createGain();
        osc.type = type;
        osc.frequency.value = frequency;
        amp.gain.setValueAtTime(gain, audioContext.currentTime);
        amp.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + duration);
        osc.connect(amp);
        amp.connect(audioContext.destination);
        osc.start();
        osc.stop(audioContext.currentTime + duration);
      }

      // ------- Background music (v3) -------
      // Generative ambient loop, no audio asset needed. D-major pentatonic
      // (a scale that sounds bright in both Thai and Western ears: D E F# A B).
      // Bass drone on slow 3-second alternation D/A; melody dances above.
      // Volumes deliberately tucked under SFX so collects/hits stay readable.
      const MUSIC_LOOP_DUR = 7.2; // seconds — one full melodic phrase
      const MUSIC_BEATS = [
        // bass drone (long, low)
        { t: 0.00, hz: 146.83, dur: 2.9, type: "sine",     gain: 0.030 }, // D3
        { t: 3.60, hz: 110.00, dur: 2.9, type: "sine",     gain: 0.030 }, // A2
        // melody phrase 1
        { t: 0.00, hz: 587.33, dur: 0.55, type: "triangle", gain: 0.020 }, // D5
        { t: 0.60, hz: 440.00, dur: 0.55, type: "triangle", gain: 0.018 }, // A4
        { t: 1.20, hz: 369.99, dur: 0.50, type: "triangle", gain: 0.018 }, // F#4
        { t: 1.80, hz: 329.63, dur: 0.45, type: "triangle", gain: 0.017 }, // E4
        { t: 2.40, hz: 293.66, dur: 0.65, type: "triangle", gain: 0.020 }, // D4
        // melody phrase 2 (rises)
        { t: 3.60, hz: 440.00, dur: 0.55, type: "triangle", gain: 0.020 }, // A4
        { t: 4.20, hz: 493.88, dur: 0.50, type: "triangle", gain: 0.019 }, // B4
        { t: 4.80, hz: 587.33, dur: 0.50, type: "triangle", gain: 0.022 }, // D5
        { t: 5.40, hz: 659.25, dur: 0.45, type: "triangle", gain: 0.020 }, // E5 (peak)
        { t: 6.00, hz: 440.00, dur: 0.45, type: "triangle", gain: 0.016 }, // A4 grace
        { t: 6.60, hz: 587.33, dur: 0.50, type: "triangle", gain: 0.014 }  // D5 resolve
      ];

      // Schedules notes for the current music loop. Called once per
      // frame from update() but only emits notes whose time-in-loop has
      // arrived since the last frame. Resets cleanly if muted, paused,
      // or the game is on a menu/transition screen so the music never
      // overlaps itself between sessions.
      function tickMusic() {
        if (state.muted || !audioContext || state.mode !== "playing") {
          state.musicPlaying = false;
          return;
        }
        const now = audioContext.currentTime;
        if (!state.musicPlaying) {
          state.musicLoopStart = now;
          state.musicNoteIdx = 0;
          state.musicPlaying = true;
        }
        if (now - state.musicLoopStart >= MUSIC_LOOP_DUR) {
          state.musicLoopStart += MUSIC_LOOP_DUR;
          state.musicNoteIdx = 0;
        }
        const loopElapsed = now - state.musicLoopStart;
        while (state.musicNoteIdx < MUSIC_BEATS.length) {
          const beat = MUSIC_BEATS[state.musicNoteIdx];
          if (loopElapsed >= beat.t) {
            playTone(beat.hz, beat.dur, beat.type, beat.gain);
            state.musicNoteIdx += 1;
          } else {
            break;
          }
        }
      }

      canvas.addEventListener("pointerdown", (event) => {
        if (state.mode !== "playing") return;
        event.preventDefault();
        input.pointer = true;
        input.pointerId = event.pointerId;
        canvas.setPointerCapture(event.pointerId);
        setTargetFromPointer(event);
      });

      canvas.addEventListener("pointermove", (event) => {
        if (!input.pointer || event.pointerId !== input.pointerId || state.mode !== "playing") return;
        event.preventDefault();
        setTargetFromPointer(event);
      });

      canvas.addEventListener("pointerup", (event) => {
        if (event.pointerId !== input.pointerId) return;
        input.pointer = false;
        input.pointerId = null;
      });

      canvas.addEventListener("pointercancel", () => {
        input.pointer = false;
        input.pointerId = null;
      });

      // Fix 2026-05-27: the primaryBtn ("เริ่มเล่น" / "เล่นต่อ" /
      // "ลองอีกครั้ง") never had a click handler. The game was only
      // startable via the Enter key, which broke on mobile (no
      // keyboard) and confused desktop players who clicked the
      // obvious button. Route the click to the same logic as Enter:
      // resume from pause, otherwise start a fresh game from menu/
      // gameover/victory.
      primaryBtn.addEventListener("click", () => {
        if (state.mode === "paused") {
          resumeGame();
        } else if (["menu", "gameover", "victory"].includes(state.mode)) {
          startGame();
        }
      });

      window.addEventListener("keydown", (event) => {
        if (document.activeElement === playerNameInput) {
          if (event.code === "Enter") {
            event.preventDefault();
            submitHiScore();
          }
          return;
        }

        const controlKeys = ["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown", "KeyA", "KeyD", "KeyW", "KeyS", "Space", "Enter"];
        if (controlKeys.includes(event.code)) event.preventDefault();

        if (event.code === "Enter" && ["menu", "gameover", "victory"].includes(state.mode)) {
          startGame();
          return;
        }

        if (event.code === "Space") {
          if (["menu", "gameover", "victory"].includes(state.mode)) startGame();
          else if (state.mode === "playing") pauseGame();
          else if (state.mode === "paused") resumeGame();
          return;
        }

        input.keys.add(event.code);
      });

      window.addEventListener("keyup", (event) => {
        input.keys.delete(event.code);
      });

      window.addEventListener("blur", () => {
        input.keys.clear();
        input.pointer = false;
        if (state.mode === "playing") pauseGame();
      });

      document.addEventListener("visibilitychange", () => {
        if (document.hidden && state.mode === "playing") pauseGame();
      });

      pauseBtn.addEventListener("click", () => {
        unlockAudio();
        if (state.mode === "playing") pauseGame();
        else if (state.mode === "paused") resumeGame();
      });

      soundBtn.addEventListener("click", () => {
        unlockAudio();
        state.muted = !state.muted;
        drawSoundIcon();
      });

      scoreForm.addEventListener("submit", (event) => {
        event.preventDefault();
        submitHiScore();
      });

      primaryBtn.addEventListener("click", () => {
        if (state.mode === "paused") resumeGame();
        else startGame();
      });

      window.addEventListener("resize", resizeCanvas);

      resizeCanvas();
      drawSoundIcon();
      setScreen("menu");
      updateHud();
      requestAnimationFrame(loop);

      window.NarwhalBubbleGlide = {
        start: startGame,
        pause: pauseGame,
        resume: resumeGame,
        reset: resetGame
      };
    })();
  </script>
</body>
</html>
