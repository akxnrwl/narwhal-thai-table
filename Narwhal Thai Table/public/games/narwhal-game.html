<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Narwhal Bubble Glide</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17324d;
      --foam: #d9f7ff;
      --gold: #ffd166;
      --panel: rgba(255, 255, 255, 0.78);
      --line: rgba(23, 50, 77, 0.14);
      font-family: "Noto Sans Thai", "Sarabun", "Segoe UI", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 20% 10%, rgba(255, 209, 102, 0.2), transparent 24%),
        linear-gradient(160deg, #ecfbff 0%, #c5f1f7 45%, #a8e6ef 100%);
      color: var(--ink);
    }

    .narwhal-game { width: min(100%, 520px); }

    .game-top {
      position: absolute;
      z-index: 4;
      top: 12px;
      left: 14px;
      right: 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      pointer-events: none;
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .stats { pointer-events: none; }
    .controls { pointer-events: auto; }

    .game-stage.is-overlay-open .game-top {
      opacity: 0;
      transform: translateY(-6px);
      pointer-events: none;
    }

    .game-stage.is-transitioning .game-top {
      opacity: 0;
      transform: translateY(-6px);
      pointer-events: none;
    }

    .stats {
      position: relative;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      overflow: hidden;
      padding: 4px;
      border: 1px solid rgba(255, 255, 255, 0.62);
      border-radius: 8px;
      background:
        radial-gradient(circle at 8% 18%, rgba(255, 255, 255, 0.88) 0 5px, transparent 6px),
        radial-gradient(circle at 87% 72%, rgba(255, 255, 255, 0.48) 0 4px, transparent 5px),
        linear-gradient(180deg, rgba(236, 251, 255, 0.8), rgba(139, 232, 220, 0.36));
      backdrop-filter: blur(10px);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.78),
        0 10px 24px rgba(23, 50, 77, 0.12);
    }

    .stat {
      position: relative;
      min-width: 0;
      padding: 7px 8px 6px;
      border-radius: 7px;
      text-align: center;
    }

    .stat + .stat::before {
      content: "";
      position: absolute;
      left: -1px;
      top: 8px;
      bottom: 8px;
      width: 1px;
      background: linear-gradient(transparent, rgba(11, 111, 130, 0.18), transparent);
    }

    .stat span {
      display: block;
      font-size: 11px;
      line-height: 1.1;
      color: rgba(11, 111, 130, 0.76);
      white-space: nowrap;
    }

    .stat strong {
      display: block;
      margin-top: 2px;
      font-size: 19px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .controls {
      display: flex;
      gap: 7px;
    }

    .icon-button,
    .primary-button {
      border: 0;
      border-radius: 8px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.84);
      box-shadow: 0 10px 22px rgba(23, 50, 77, 0.12);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .icon-button {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, 0.66);
      border-radius: 8px;
      background:
        radial-gradient(circle at 30% 24%, rgba(255, 255, 255, 0.86), transparent 28%),
        linear-gradient(180deg, rgba(236, 251, 255, 0.82), rgba(217, 247, 255, 0.56));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.8),
        0 10px 22px rgba(23, 50, 77, 0.12);
    }

    .icon-button svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      stroke-width: 2.35;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .icon-button:disabled {
      cursor: default;
      opacity: 0.46;
    }

    .icon-button[aria-pressed="true"] {
      color: #0b6f82;
      background:
        radial-gradient(circle at 30% 24%, rgba(255, 255, 255, 0.9), transparent 30%),
        linear-gradient(180deg, rgba(255, 242, 204, 0.92), rgba(217, 247, 255, 0.68));
    }

    .game-stage {
      position: relative;
      overflow: hidden;
      border-radius: 8px;
      border: 1px solid rgba(23, 50, 77, 0.16);
      box-shadow: 0 22px 54px rgba(23, 50, 77, 0.2);
      background: #79d9e8;
      touch-action: none;
      user-select: none;
    }

    canvas {
      display: block;
      width: 100%;
      aspect-ratio: 500 / 620;
      touch-action: none;
    }

    .screen {
      position: absolute;
      z-index: 5;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
      background:
        linear-gradient(180deg, rgba(217, 247, 255, 0.28), rgba(61, 183, 212, 0.28)),
        rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(5px);
      transition: opacity 180ms ease, visibility 180ms ease;
    }

    .screen.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .screen.is-surprise {
      background:
        linear-gradient(180deg, rgba(255, 242, 204, 0.24), rgba(139, 232, 220, 0.18)),
        rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(3px);
    }

    .screen.is-surprise .screen-inner {
      border-color: rgba(255, 209, 102, 0.9);
      background: rgba(255, 255, 255, 0.84);
      box-shadow: 0 18px 46px rgba(138, 90, 0, 0.2);
    }

    .screen.is-final-try .screen-inner {
      border-color: rgba(255, 159, 183, 0.72);
      background: rgba(255, 255, 255, 0.82);
    }

    .screen-inner {
      width: min(100%, 360px);
      padding: 22px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.72);
      background: rgba(255, 255, 255, 0.74);
      box-shadow: 0 18px 42px rgba(23, 50, 77, 0.16);
    }

    .kicker {
      margin: 0 0 4px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0;
      color: #0b6f82;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 8vw, 42px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .screen-copy {
      margin: 10px 0 18px;
      font-size: 16px;
      line-height: 1.45;
    }

    .score-form,
    .leaderboard {
      margin-top: 12px;
    }

    .score-form.is-hidden,
    .leaderboard.is-hidden {
      display: none;
    }

    .score-label,
    .leaderboard-title,
    .score-note {
      display: block;
      margin: 0 0 6px;
      font-size: 12px;
      font-weight: 800;
      color: #0b6f82;
    }

    .score-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .score-input {
      min-width: 0;
      height: 42px;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.9);
      color: var(--ink);
      font: inherit;
      font-weight: 800;
    }

    .save-score-button {
      min-width: 74px;
      height: 42px;
      border: 0;
      border-radius: 8px;
      background: #d9f7ff;
      color: #0b6f82;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
    }

    .save-score-button:disabled {
      cursor: default;
      opacity: 0.52;
    }

    .score-note {
      min-height: 18px;
      margin: 6px 0 0;
      color: #8a5a00;
    }

    .score-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 4px;
      font-size: 13px;
      text-align: left;
    }

    .score-list li {
      display: grid;
      grid-template-columns: 22px 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 5px 8px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.48);
      color: var(--ink);
      font-weight: 800;
    }

    .score-list .score-empty {
      grid-template-columns: 1fr;
      text-align: center;
      color: rgba(23, 50, 77, 0.68);
    }

    .primary-button {
      min-width: 156px;
      min-height: 46px;
      padding: 10px 18px;
      font: inherit;
      font-weight: 800;
      background: var(--gold);
      border: 1px solid rgba(23, 50, 77, 0.12);
    }

    .primary-button:hover,
    .icon-button:hover { transform: translateY(-1px); }

    .primary-button:active,
    .icon-button:active { transform: translateY(1px); }

    @media (max-width: 430px) {
      body { padding: 6px; }
      .game-top {
        grid-template-columns: 1fr auto;
        gap: 5px;
        left: 8px;
        right: 8px;
        top: 8px;
      }
      .controls { justify-content: end; }
      .stats { padding: 3px; }
      .stat { padding: 6px 4px; }
      .stat:nth-child(4) { display: none; }
      .stat span { font-size: 10px; }
      .stat strong { font-size: 16px; }
      .icon-button { width: 38px; height: 38px; }
    }
  </style>
</head>
<body>
  <main class="narwhal-game" aria-label="Narwhal Bubble Glide">
    <section class="game-stage">
      <div class="game-top">
        <div class="stats" aria-live="polite">
          <div class="stat">
            <span>คะแนน</span>
            <strong id="score">0</strong>
          </div>
          <div class="stat">
            <span>เวลา</span>
            <strong id="timeLeft">40</strong>
          </div>
          <div class="stat">
            <span>ด่าน</span>
            <strong id="levelNow">1/5</strong>
          </div>
          <div class="stat">
            <span id="bestLabel">ดีที่สุด</span>
            <strong id="bestScore">0</strong>
          </div>
        </div>
        <div class="controls">
          <button class="icon-button" id="pauseBtn" type="button" aria-label="พักเกม" title="พักเกม" disabled>
            <svg id="pauseIcon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M8 5v14"></path>
              <path d="M16 5v14"></path>
            </svg>
          </button>
          <button class="icon-button" id="soundBtn" type="button" aria-label="เปิดหรือปิดเสียง" title="เสียง">
            <svg id="soundIcon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 10v4h4l5 4V6l-5 4H4z"></path>
              <path d="M16 9.5a4 4 0 0 1 0 5"></path>
              <path d="M18.5 7a8 8 0 0 1 0 10"></path>
            </svg>
          </button>
        </div>
      </div>
      <canvas id="gameCanvas" width="500" height="620" aria-label="เกมนาร์วาฬเก็บจานผัดไทยและหม้อต้มยำ"></canvas>
      <div class="screen" id="screen">
        <div class="screen-inner">
          <p class="kicker" id="screenKicker">เกมนาร์วาฬ</p>
          <h1 id="screenTitle">Bubble Glide</h1>
          <p class="screen-copy" id="screenCopy">ผ่าน 5 ด่าน เก็บจานผัดไทย หม้อต้มยำ หัวใจ และเกราะสั้นๆ เพื่อรอดจากอุปสรรค</p>
          <form class="score-form is-hidden" id="scoreForm" autocomplete="off">
            <label class="score-label" for="playerName">ชื่อในตาราง hi-score</label>
            <div class="score-row">
              <input class="score-input" id="playerName" name="playerName" type="text" maxlength="14" placeholder="ชื่อนาวาฬ" inputmode="text">
              <button class="save-score-button" id="saveScoreBtn" type="submit">บันทึก</button>
            </div>
            <p class="score-note" id="scoreNote" aria-live="polite"></p>
          </form>
          <div class="leaderboard is-hidden" id="leaderboard">
            <p class="leaderboard-title">Hi-score</p>
            <ol class="score-list" id="scoreList"></ol>
          </div>
          <button class="primary-button" id="primaryBtn" type="button">เริ่มเล่น</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    (() => {
      const CONFIG = {
        width: 500,
        height: 620,
        // v4: horizon Y defines where the water surface sits. Above this
        // line is the SKY band (surfers / boats / jet skis / birds);
        // below is the underwater play area the narwhal swims in.
        // safeTop is kept generous so the narwhal never crashes into the
        // surface ceiling — it has to choose to swim shallow to interact
        // with surface stuff (and risk getting hit by a hull above).
        horizonY: 148,
        safeTop: 178,           // narwhal can't swim higher than this
        surfaceDangerDepth: 92, // boats/jet skis project hazard this far down
        safeBottom: 74,
        storageKey: "narwhal-bubble-glide-best-v2",
        scoresKey: "narwhal-bubble-glide-hi-scores-v1",
        playerNameKey: "narwhal-bubble-glide-player-name"
      };

      const LEVELS = [
        // v3 — 5-level California-coast tour ending at Huntington Beach.
        // Difficulty mapped from old levels 5→1, 6→2, 7→3, 8→4, 10→5
        // (skipped old 9 to keep a 5-slot run, kept old 10 as finale).
        // Palette per level still keeps the playful bright cyan family but
        // shifts toward brand brass/navy in the finale so the last screen
        // looks like the rest of the restaurant site.
        { id: 1, name: "Sunset Beach Lagoon",  goal: 1180, duration: 38, bubbleGap: 0.54, inkGap: 4.6, goldGap: 7.4, powerGap: 12.5, speed: 1.22, current: 0.11, penaltyScore: 18, penaltyTime: 0, pattern: "paired",     palette: ["#eaf6ff", "#82c9e9", "#3a78b3"], powers: ["shield"] },
        { id: 2, name: "Bolsa Chica Drift",    goal: 1500, duration: 36, bubbleGap: 0.52, inkGap: 3.8, goldGap: 7.0, powerGap: 13.2, speed: 1.32, current: 0.16, penaltyScore: 26, penaltyTime: 1, pattern: "lane",       palette: ["#fff7dd", "#9bd9c0", "#377f6d"], powers: ["shield"] },
        { id: 3, name: "Pacific Coast Glide",  goal: 1840, duration: 35, bubbleGap: 0.5,  inkGap: 3.1, goldGap: 6.6, powerGap: 14.0, speed: 1.44, current: 0.21, penaltyScore: 32, penaltyTime: 1, pattern: "finaleSoft", palette: ["#fffaef", "#d8b96f", "#8a6b26"], powers: ["shield"] },
        { id: 4, name: "Newport Reef",         goal: 2200, duration: 34, bubbleGap: 0.48, inkGap: 2.7, goldGap: 6.2, powerGap: 15.0, speed: 1.56, current: 0.27, penaltyScore: 40, penaltyTime: 2, pattern: "finaleStep", palette: ["#e3edf7", "#5fa3c8", "#26456f"], powers: ["shield"] },
        // Finale palette uses the restaurant brand: brass gold over deep navy
        // so the win screen feels like part of narwhalthaihb.com.
        { id: 5, name: "Huntington Beach",     goal: 2850, duration: 30, bubbleGap: 0.42, inkGap: 1.98, goldGap: 5.4, powerGap: 17.0, speed: 1.9,  current: 0.42, penaltyScore: 64, penaltyTime: 2, pattern: "finale",     palette: ["#fff2cc", "#d4b36a", "#0B1F33"], powers: ["shield"] }
      ];

      const FORM_META = {
        classic: { label: "Classic", body: "#7fddeb", fin: "#4fb9cd", horn: "#fff7c7", aura: "rgba(217,247,255,0.35)" },
        giant: { label: "Giant", body: "#7ee6d0", fin: "#4ec7a9", horn: "#ffe08a", aura: "rgba(255,209,102,0.32)" },
        moon: { label: "Moon", body: "#9bd9ff", fin: "#7388ff", horn: "#f7f1ff", aura: "rgba(160,180,255,0.38)" },
        star: { label: "Starhorn", body: "#8df2e6", fin: "#ffd166", horn: "#fff1a8", aura: "rgba(255,209,102,0.46)" },
        mirror: { label: "Mirror", body: "#bdeaff", fin: "#d7c6ff", horn: "#ffffff", aura: "rgba(215,198,255,0.42)" }
      };

      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d", { alpha: false });
      const gameStage = document.querySelector(".game-stage");
      const scoreEl = document.getElementById("score");
      const timeEl = document.getElementById("timeLeft");
      const levelEl = document.getElementById("levelNow");
      const bestEl = document.getElementById("bestScore");
      const bestLabelEl = document.getElementById("bestLabel");
      const pauseBtn = document.getElementById("pauseBtn");
      const soundBtn = document.getElementById("soundBtn");
      const pauseIcon = document.getElementById("pauseIcon");
      const soundIcon = document.getElementById("soundIcon");
      const screen = document.getElementById("screen");
      const screenKicker = document.getElementById("screenKicker");
      const screenTitle = document.getElementById("screenTitle");
      const screenCopy = document.getElementById("screenCopy");
      const scoreForm = document.getElementById("scoreForm");
      const playerNameInput = document.getElementById("playerName");
      const saveScoreBtn = document.getElementById("saveScoreBtn");
      const scoreNote = document.getElementById("scoreNote");
      const leaderboard = document.getElementById("leaderboard");
      const scoreList = document.getElementById("scoreList");
      const primaryBtn = document.getElementById("primaryBtn");

      const random = (min, max) => min + Math.random() * (max - min);
      const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
      const distance = (ax, ay, bx, by) => Math.hypot(ax - bx, ay - by);

      const input = { keys: new Set(), pointer: false, pointerId: null };

      const whale = {
        x: CONFIG.width * 0.5,
        y: CONFIG.height * 0.72,
        targetX: CONFIG.width * 0.5,
        targetY: CONFIG.height * 0.72,
        vx: 0,
        vy: 0,
        faceTilt: 0,
        smile: 0,
        blink: 2.2,
        form: "classic",
        formTimer: 0,
        scale: 1,
        shield: 0,
        invulnerable: 0,
        trail: []
      };

      const state = {
        mode: "menu",
        deathReason: "",
        lives: 1,
        heartSpawned: false,
        heartTimer: 5,
        score: 0,
        levelScore: 0,
        levelIndex: 0,
        highestLevel: 1,
        finalSurprise: false,
        finalTimeLeft: 0,
        best: loadBest(),
        bestCombo: 0,
        scoreSaved: false,
        timeLeft: LEVELS[0].duration,
        elapsed: 0,
        clock: 0,
        combo: 0,
        comboTimer: 0,
        noHit: true,
        noPause: true,
        feverTimer: 0,
        transitionTimer: 0,
        transitionText: "",
        badgeText: "",
        celebrationTimer: 0,
        celebrationPulse: 0,
        celebrationKind: "",
        spawnTimer: 0.2,
        inkTimer: 9,
        goldTimer: 5,
        powerTimer: 6,
        cometTimer: 12,
        lastFrame: 0,
        muted: false,
        // v3 music state — tickMusic() resets these whenever the game
        // isn't actively running, so the loop never overlaps itself.
        musicPlaying: false,
        musicLoopStart: 0,
        musicNoteIdx: 0,
        // v4: above-water (sky) entities — surfers, boats, jet skis, birds.
        // Separate from .entities so they have their own update/draw pass.
        // surfaceTimer paces the next spawn; reset on each new run.
        surfaceEntities: [],
        surfaceTimer: 3.5,
        shake: 0,
        flash: 0,
        waveBurst: 0,
        entities: [],
        particles: [],
        floaters: [],
        bgBubbles: createBackgroundBubbles()
      };

      let audioContext = null;

      function level() {
        return LEVELS[state.levelIndex];
      }

      function loadBest() {
        try {
          const raw = localStorage.getItem(CONFIG.storageKey);
          if (!raw) return 0;
          const parsed = JSON.parse(raw);
          return Number(parsed.score || parsed) || 0;
        } catch (error) {
          return 0;
        }
      }

      function saveBest() {
        try {
          localStorage.setItem(CONFIG.storageKey, JSON.stringify({
            score: Math.floor(state.best),
            combo: Math.floor(state.bestCombo),
            level: Math.floor(state.highestLevel)
          }));
        } catch (error) {
          // Best score is optional; private browsing should not block play.
        }
      }

      // v4: remote leaderboard cache. Filled by fetchRemoteScores() on
      // panel open + after every submit. renderScoreboard() prefers it
      // when populated; otherwise falls back to localStorage so the UI
      // still works offline / on first paint before the fetch completes.
      let remoteScoresCache = null;

      function loadScores() {
        // Returns whichever list we have on hand — remote first, else local.
        if (remoteScoresCache) return remoteScoresCache.slice();
        try {
          const raw = localStorage.getItem(CONFIG.scoresKey);
          const parsed = raw ? JSON.parse(raw) : [];
          return Array.isArray(parsed) ? parsed.filter((item) => Number.isFinite(Number(item.score))) : [];
        } catch (error) {
          return [];
        }
      }

      async function fetchRemoteScores() {
        try {
          const res = await fetch("/api/scores", { cache: "no-store" });
          if (!res.ok) return;
          const data = await res.json();
          if (Array.isArray(data.scores)) {
            remoteScoresCache = data.scores;
            renderScoreboard();
          }
        } catch (_) {
          // network down / no Netlify Functions yet — silently fall back to local
        }
      }

      async function postScoreRemote(entry, durationMs) {
        try {
          const res = await fetch("/api/scores", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({
              name: entry.name,
              score: entry.score,
              level: entry.level,
              victory: entry.victory,
              durationMs
            })
          });
          if (!res.ok) return false;
          const data = await res.json();
          if (Array.isArray(data.scores)) {
            remoteScoresCache = data.scores;
            renderScoreboard();
          }
          return true;
        } catch (_) {
          return false;
        }
      }

      function saveScores(scores) {
        try {
          localStorage.setItem(CONFIG.scoresKey, JSON.stringify(scores.slice(0, 5)));
        } catch (error) {
          // Scoreboard is optional; gameplay should still work.
        }
      }

      function loadPlayerName() {
        try {
          return localStorage.getItem(CONFIG.playerNameKey) || "";
        } catch (error) {
          return "";
        }
      }

      function savePlayerName(name) {
        try {
          localStorage.setItem(CONFIG.playerNameKey, name);
        } catch (error) {
          // Remembering the name is optional.
        }
      }

      function cleanPlayerName(value) {
        return (value || "").trim().replace(/\s+/g, " ").slice(0, 14) || "Narwhal";
      }

      function renderScoreboard() {
        const scores = loadScores()
          .sort((a, b) => Number(b.score) - Number(a.score))
          .slice(0, 5);
        scoreList.innerHTML = "";
        if (!scores.length) {
          const empty = document.createElement("li");
          empty.className = "score-empty";
          empty.textContent = "ยังไม่มีคะแนนบันทึก";
          scoreList.appendChild(empty);
          return;
        }

        for (const [index, item] of scores.entries()) {
          const row = document.createElement("li");
          const rank = document.createElement("span");
          const name = document.createElement("span");
          const points = document.createElement("span");
          rank.textContent = `${index + 1}.`;
          name.textContent = `${item.name || "Narwhal"} ${item.victory ? "★" : `ด่าน ${item.level || 1}`}`;
          points.textContent = Math.floor(Number(item.score) || 0);
          row.append(rank, name, points);
          scoreList.appendChild(row);
        }
      }

      function updateScorePanel(visible) {
        scoreForm.classList.toggle("is-hidden", !visible);
        leaderboard.classList.toggle("is-hidden", !visible);
        if (!visible) return;

        if (!playerNameInput.value.trim()) playerNameInput.value = loadPlayerName();
        saveScoreBtn.disabled = state.scoreSaved;
        scoreNote.textContent = state.scoreSaved ? "บันทึกคะแนนแล้ว" : "พิมพ์ชื่อแล้วกดบันทึก";
        renderScoreboard();
        // Fire-and-forget refresh from the server. Re-renders when it lands.
        fetchRemoteScores();
      }

      function submitHiScore() {
        if (!["gameover", "victory"].includes(state.mode)) return;
        if (state.scoreSaved) {
          scoreNote.textContent = "คะแนนรอบนี้บันทึกแล้ว";
          return;
        }

        const name = cleanPlayerName(playerNameInput.value);
        playerNameInput.value = name;
        savePlayerName(name);
        const entry = {
          name,
          score: Math.floor(state.score),
          level: Math.floor(state.highestLevel),
          combo: Math.floor(state.bestCombo),
          victory: state.mode === "victory",
          date: new Date().toISOString()
        };
        // Save locally immediately (so the player sees it even offline)
        const localScores = (loadScores().concat(entry))
          .sort((a, b) => Number(b.score) - Number(a.score))
          .slice(0, 5);
        saveScores(localScores);
        state.scoreSaved = true;
        saveScoreBtn.disabled = true;
        scoreNote.textContent = "บันทึก hi-score แล้ว";
        renderScoreboard();
        // Then try to publish to the central leaderboard. If it accepts,
        // remoteScoresCache will refresh and the panel re-renders with
        // everyone's scores. If it fails (offline / no function yet),
        // we silently keep the local entry.
        const durationMs = state.elapsed > 0 ? Math.floor(state.elapsed * 1000) : 0;
        postScoreRemote(entry, durationMs);
      }

      function createBackgroundBubbles() {
        return Array.from({ length: 36 }, () => ({
          x: random(10, CONFIG.width - 10),
          y: random(0, CONFIG.height),
          r: random(2, 8),
          speed: random(8, 24),
          drift: random(0.4, 1.7),
          phase: random(0, Math.PI * 2),
          alpha: random(0.12, 0.36)
        }));
      }

      function resizeCanvas() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width = Math.round(CONFIG.width * dpr);
        canvas.height = Math.round(CONFIG.height * dpr);
        canvas.style.aspectRatio = `${CONFIG.width} / ${CONFIG.height}`;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function setScreen(type) {
        const finalStage = type === "gameover" && (level().id === 5 || state.highestLevel >= 5);
        screen.classList.toggle("is-hidden", type === "hidden");
        screen.classList.toggle("is-surprise", type === "victory" && state.finalSurprise);
        screen.classList.toggle("is-final-try", finalStage);
        gameStage.classList.toggle("is-overlay-open", type !== "hidden");
        pauseBtn.disabled = type !== "hidden" && state.mode !== "paused";
        updateScorePanel(type === "gameover" || type === "victory");

        if (type === "menu") {
          screenKicker.textContent = "5 ด่านใหม่";
          screenTitle.textContent = "Bubble Glide";
          screenCopy.textContent = "เก็บผัดไทย ต้มยำ หัวใจ และเกราะสั้นๆ พานาวาฬไปให้ถึง Huntington Beach";
          primaryBtn.textContent = "เริ่มเล่น";
        }

        if (type === "paused") {
          screenKicker.textContent = `ด่าน ${level().id}: ${level().name}`;
          screenTitle.textContent = "หยุดไว้ก่อน";
          screenCopy.textContent = `คะแนน ${Math.floor(state.score)} | คอมโบสูงสุด ${Math.floor(state.bestCombo)}`;
          primaryBtn.textContent = "เล่นต่อ";
        }

        if (finalStage) {
          screenKicker.textContent = "ถึงด่าน 10 แล้ว";
          screenTitle.textContent = "เก่งมากแล้ว";
          screenCopy.textContent = `พานาวาฬมาถึง Huntington Beach ได้แล้ว | ${Math.floor(state.score)} คะแนน | ดีที่สุด ${Math.floor(state.best)} คะแนน`;
          primaryBtn.textContent = "ลองคว้ามงกุฎอีกครั้ง";
          return;
        }

        if (type === "victory" && state.finalSurprise) {
          screenKicker.textContent = "Welcome to HB";
          screenTitle.textContent = "มงกุฎเชฟของนาวาฬ";
          screenCopy.textContent = `ผ่านครบ 5 ด่านทันเวลา เหลือ ${Math.ceil(state.finalTimeLeft)} วิ | ${Math.floor(state.score)} คะแนน | คอมโบสูงสุด ${Math.floor(state.bestCombo)}`;
          primaryBtn.textContent = "เล่นรอบใหม่";
          return;
        }

        if (type === "gameover") {
          screenKicker.textContent = `ถึงด่าน ${state.highestLevel}/5`;
          screenTitle.textContent = `${Math.floor(state.score)} คะแนน`;
          screenCopy.textContent = `${state.deathReason} | เป้าหมายด่านนี้ ${level().goal} | ดีที่สุด ${Math.floor(state.best)} คะแนน`;
          primaryBtn.textContent = "ลองอีกครั้ง";
        }

        if (type === "victory") {
          screenKicker.textContent = "ครบ 5 ด่าน";
          screenTitle.textContent = "Huntington Beach Clear";
          screenCopy.textContent = `จบด้วย ${Math.floor(state.score)} คะแนน | คอมโบสูงสุด ${Math.floor(state.bestCombo)}`;
          primaryBtn.textContent = "เล่นรอบใหม่";
        }
      }

      function syncStageChrome() {
        const transitioning = state.transitionTimer > 0 && (state.mode === "playing" || state.mode === "levelComplete");
        gameStage.classList.toggle("is-transitioning", transitioning);
      }

      function resetGame() {
        state.score = 0;
        state.deathReason = "";
        state.lives = 1;
        state.heartSpawned = false;
        state.heartTimer = random(4.2, 7.2);
        state.levelScore = 0;
        state.levelIndex = 0;
        state.highestLevel = 1;
        state.finalSurprise = false;
        state.finalTimeLeft = 0;
        state.timeLeft = level().duration;
        state.elapsed = 0;
        state.combo = 0;
        state.comboTimer = 0;
        state.bestCombo = 0;
        state.scoreSaved = false;
        state.noHit = true;
        state.noPause = true;
        state.feverTimer = 0;
        state.transitionTimer = 1.15;
        state.transitionText = `ด่าน 1: ${level().name}`;
        state.badgeText = "เริ่มการว่าย";
        state.celebrationTimer = 0;
        state.celebrationPulse = 0;
        state.celebrationKind = "";
        state.spawnTimer = 0.18;
        state.inkTimer = level().inkGap;
        state.goldTimer = level().goldGap;
        state.powerTimer = level().powerGap;
        state.cometTimer = 11;
        state.shake = 0;
        state.flash = 0;
        state.waveBurst = 0;
        state.entities.length = 0;
        state.particles.length = 0;
        state.floaters.length = 0;
        state.surfaceEntities.length = 0;
        state.surfaceTimer = 3.5;
        resetWhale();
        updateHud();
      }

      function resetWhale() {
        whale.x = whale.targetX = CONFIG.width * 0.5;
        whale.y = whale.targetY = CONFIG.height * 0.72;
        whale.vx = 0;
        whale.vy = 0;
        whale.smile = 0;
        whale.form = "classic";
        whale.formTimer = 0;
        whale.scale = 1;
        whale.shield = 0;
        whale.invulnerable = 0;
        whale.trail.length = 0;
      }

      function startGame() {
        unlockAudio();
        resetGame();
        state.mode = "playing";
        setScreen("hidden");
        pauseBtn.disabled = false;
        pauseBtn.setAttribute("aria-pressed", "false");
        drawPauseIcon(false);
      }

      function pauseGame() {
        if (state.mode !== "playing") return;
        state.mode = "paused";
        state.noPause = false;
        pauseBtn.setAttribute("aria-pressed", "true");
        drawPauseIcon(true);
        setScreen("paused");
      }

      function resumeGame() {
        if (state.mode !== "paused") return;
        state.mode = "playing";
        pauseBtn.setAttribute("aria-pressed", "false");
        drawPauseIcon(false);
        setScreen("hidden");
      }

      function endGame(victory = false, reason = "หมดเวลา") {
        state.mode = victory ? "victory" : "gameover";
        state.deathReason = victory ? "" : reason;
        const atFinalStage = level().id === 5 || state.highestLevel >= 5;
        if (victory) {
          state.finalSurprise = state.finalSurprise || level().id === 5;
          state.finalTimeLeft = Math.max(state.finalTimeLeft, state.timeLeft, 0);
          state.celebrationKind = "victory";
          state.celebrationTimer = 4.2;
          state.celebrationPulse = 0;
          state.shake = 0;
          state.flash = Math.max(state.flash, 0.55);
          whale.smile = 2.2;
          addFinalCelebration(true);
        } else if (atFinalStage) {
          state.celebrationKind = "finalTry";
          state.celebrationTimer = 2.8;
          state.celebrationPulse = 0;
          state.shake = 0;
          state.flash = Math.max(state.flash, 0.34);
          whale.smile = 1.25;
          addFinalCelebration(false);
        }
        if (state.score > state.best) {
          state.best = Math.floor(state.score);
          saveBest();
        }
        pauseBtn.disabled = true;
        pauseBtn.setAttribute("aria-pressed", "false");
        drawPauseIcon(false);
        updateHud();
        setScreen(victory ? "victory" : "gameover");
        playTone(victory ? 440 : 220, 0.1, "triangle", 0.04);
        setTimeout(() => playTone(victory ? 660 : 330, 0.14, "triangle", 0.035), 90);
      }

      function completeLevel() {
        const id = level().id;
        if (id === 5) {
          state.finalSurprise = state.timeLeft > 0;
          state.finalTimeLeft = Math.max(0, state.timeLeft);
        }
        const cleanBonus = state.noHit && state.noPause ? 15 + id * 3 : 0;
        if (cleanBonus) {
          state.score += cleanBonus;
          state.levelScore += cleanBonus;
          state.badgeText = "Secret Kind Bonus";
        } else if (state.combo >= 10) {
          state.badgeText = "Bubble Master";
        } else {
          state.badgeText = "Smooth Swimmer";
        }

        state.mode = "levelComplete";
        state.transitionTimer = id === 5 ? 2.05 : 1.45;
        state.transitionText = id === 5 ? "ถึง Huntington Beach แล้ว!" : `ผ่านด่าน ${id}`;
        state.entities.length = 0;
        state.feverTimer = Math.max(state.feverTimer, id === 5 ? 2.5 : 1.6);
        state.shake = 0;
        state.flash = id === 5 ? 0.62 : 0.38;
        whale.smile = id === 5 ? 2.1 : 1.4;
        state.celebrationKind = id === 5 ? "gate" : "level";
        state.celebrationTimer = id === 5 ? 2.25 : 1.55;
        state.celebrationPulse = 0;
        addFloater(state.badgeText, CONFIG.width * 0.5, 180, "#8a5a00");
        addWaveBurst(whale.x, whale.y, FORM_META[whale.form].aura);
        addLevelCelebration(id);
        playTone(640 + id * 20, 0.08, "triangle", 0.035);
        setTimeout(() => playTone(760 + id * 18, 0.09, "sine", 0.026), 120);
      }

      function nextLevel() {
        if (state.levelIndex >= LEVELS.length - 1) {
          endGame(true);
          return;
        }

        state.levelIndex += 1;
        state.highestLevel = Math.max(state.highestLevel, level().id);
        state.levelScore = 0;
        state.timeLeft = level().duration;
        state.elapsed = 0;
        state.combo = 0;
        state.comboTimer = 0;
        state.celebrationTimer = 0;
        state.celebrationPulse = 0;
        state.celebrationKind = "";
        state.lives = Math.max(1, state.lives);
        state.heartSpawned = false;
        state.heartTimer = random(4.0, 7.0);
        state.noHit = true;
        state.noPause = true;
        state.spawnTimer = 0.25;
        state.inkTimer = Math.max(2.4, level().inkGap);
        state.goldTimer = random(level().goldGap * 0.75, level().goldGap * 1.1);
        state.powerTimer = random(level().powerGap * 0.8, level().powerGap * 1.15);
        state.cometTimer = random(8, 13);
        state.entities.length = 0;
        whale.targetX = whale.x = CONFIG.width * 0.5;
        whale.targetY = whale.y = CONFIG.height * 0.72;
        if (whale.formTimer <= 0) activateForm("classic", 0);
        state.transitionTimer = 1.25;
        state.transitionText = `ด่าน ${level().id}: ${level().name}`;
        state.badgeText = level().id >= 8 ? "คลื่นแรงขึ้น" : "พร้อม";
        state.mode = "playing";
        updateHud();
      }

      function updateHud() {
        scoreEl.textContent = Math.floor(state.score);
        timeEl.textContent = Math.max(0, Math.ceil(state.timeLeft));
        levelEl.textContent = `${level().id}/5`;
        // v3: surface combo as a small ×N pill next to the score. We mutate
        // bestScore label/value because the HUD only has 4 slots — combo
        // mid-run is more interesting than "best" while you're playing.
        if (state.combo >= 2) {
          bestEl.textContent = `×${state.combo}`;
          bestLabelEl.textContent = "คอมโบ";
        } else {
          bestEl.textContent = Math.floor(state.best);
          bestLabelEl.textContent = "ดีที่สุด";
        }
      }

      function spawnBubble(type = "star", options = {}) {
        const base = { star: 21, gold: 25, pearl: 22, grow: 24, moon: 24, shield: 23, prism: 24, mirror: 23, heart: 22, mini: 12, comet: 20 };
        const r = options.r || base[type] || 21;
        const x = options.x ?? random(r + 12, CONFIG.width - r - 12);
        const y = options.y ?? CONFIG.height + r + 8;
        const fast = type === "comet";
        state.entities.push({
          type,
          kind: "collect",
          x,
          y,
          r,
          vx: options.vx ?? (fast ? random(-80, 80) : 0),
          vy: options.vy ?? (fast ? random(-230, -190) : random(-120, -82) * level().speed),
          drift: options.drift ?? random(16, 38),
          wave: random(1.2, 2.4),
          phase: random(0, Math.PI * 2),
          age: 0,
          value: valueFor(type)
        });
      }

      function valueFor(type) {
        if (type === "gold") return 24;
        if (type === "heart") return 0;
        if (type === "pearl") return 5;
        if (type === "grow" || type === "moon" || type === "shield" || type === "prism" || type === "mirror") return 10;
        if (type === "mini") return 3;
        if (type === "comet") return 36;
        return 7;
      }

      function spawnObstaclePattern() {
        const lv = level();
        if (lv.pattern === "none") return;
        const finalePattern = lv.pattern === "finaleSoft" || lv.pattern === "finaleStep" || lv.pattern === "finaleSurge" || lv.pattern === "finale";

        if (lv.pattern === "single") {
          spawnInk();
          return;
        }

        if (lv.pattern === "paired") {
          const gap = random(128, CONFIG.width - 128);
          spawnInk({ x: clamp(gap - 112, 32, CONFIG.width - 32), drift: 8 });
          spawnInk({ x: clamp(gap + 112, 32, CONFIG.width - 32), drift: 8 });
          return;
        }

        if (lv.pattern === "lane" || finalePattern) {
          const lanes = [0.13, 0.37, 0.63, 0.87].map((ratio) => CONFIG.width * ratio);
          const safeLane = Math.floor(random(0, lanes.length));
          const laneRules = {
            lane: { count: Math.random() < 0.38 ? 2 : 3, vyMin: -128, vyMax: -104 },
            finaleSoft: { count: 2, vyMin: -122, vyMax: -98 },
            finaleStep: { count: Math.random() < 0.42 ? 2 : 3, vyMin: -126, vyMax: -102 },
            finaleSurge: { count: 3, vyMin: -130, vyMax: -106 },
            finale: { count: 3, vyMin: -134, vyMax: -108 }
          };
          const laneRule = laneRules[lv.pattern] || laneRules.lane;
          const laneChoices = lanes
            .map((x, index) => ({ x, index, order: Math.random() }))
            .filter((lane) => lane.index !== safeLane)
            .sort((a, b) => a.order - b.order)
            .slice(0, laneRule.count);

          for (const lane of laneChoices) {
            spawnInk({ x: lane.x, drift: 5, vy: random(laneRule.vyMin, laneRule.vyMax) * lv.speed });
          }
          if (lv.pattern === "lane") return;
        }

        if (lv.pattern === "cross" || finalePattern) {
          const crossRules = {
            cross: { chance: 1, vxMin: 38, vxMax: 72, vyMin: -132, vyMax: -106, spread: 18 },
            finaleSoft: { chance: 0.44, vxMin: 24, vxMax: 44, vyMin: -118, vyMax: -96, spread: 58 },
            finaleStep: { chance: 0.68, vxMin: 30, vxMax: 56, vyMin: -124, vyMax: -100, spread: 42 },
            finaleSurge: { chance: 0.86, vxMin: 36, vxMax: 68, vyMin: -130, vyMax: -104, spread: 28 },
            finale: { chance: 1, vxMin: 42, vxMax: 78, vyMin: -134, vyMax: -108, spread: 12 }
          };
          const crossRule = crossRules[lv.pattern] || crossRules.cross;
          if (Math.random() > crossRule.chance) return;

          const baseY = CONFIG.height + 32;
          spawnInk({ x: 38, y: baseY, vx: random(crossRule.vxMin, crossRule.vxMax), drift: 4, vy: random(crossRule.vyMin, crossRule.vyMax) * lv.speed });
          spawnInk({ x: CONFIG.width - 38, y: baseY + crossRule.spread, vx: -random(crossRule.vxMin, crossRule.vxMax), drift: 4, vy: random(crossRule.vyMin, crossRule.vyMax) * lv.speed });
        }
      }

      function chooseObstacleType(id) {
        // v3: 5 levels mapped from old 5/6/7/8/10. Mix preserved so each
        // level still feels distinct (jelly/reef on L1, lanes on L2, etc.).
        const roll = Math.random();
        if (id === 1) return roll < 0.42 ? "jelly" : roll < 0.7 ? "reef" : "ink";
        if (id === 2) return roll < 0.36 ? "whirlpool" : roll < 0.66 ? "jelly" : roll < 0.86 ? "reef" : "ink";
        if (id === 3) return roll < 0.34 ? "reef" : roll < 0.58 ? "whirlpool" : roll < 0.82 ? "jelly" : "ink";
        if (id === 4) return roll < 0.36 ? "whirlpool" : roll < 0.62 ? "reef" : roll < 0.82 ? "jelly" : "ink";
        return roll < 0.46 ? "whirlpool" : roll < 0.74 ? "reef" : roll < 0.9 ? "jelly" : "ink";
      }

      function spawnInk(options = {}) {
        const id = level().id;
        const r = options.r || random(20, 27);
        const type = options.type || chooseObstacleType(id);
        state.entities.push({
          type,
          kind: "obstacle",
          x: options.x ?? random(r + 14, CONFIG.width - r - 14),
          y: options.y ?? CONFIG.height + r + 8,
          r: type === "kelp" ? random(24, 34) : type === "reef" ? random(23, 31) : type === "whirlpool" ? random(31, 40) : r,
          vx: options.vx ?? 0,
          vy: options.vy ?? random(type === "whirlpool" ? -88 : -118, type === "whirlpool" ? -68 : -92) * level().speed,
          drift: options.drift ?? random(type === "whirlpool" ? 6 : 12, type === "whirlpool" ? 18 : 30),
          wave: random(type === "reef" ? 0.4 : 0.9, type === "reef" ? 1.0 : 1.8),
          phase: random(0, Math.PI * 2),
          age: 0
        });
      }

      function addParticles(x, y, color, count = 14) {
        const room = Math.max(0, 120 - state.particles.length);
        const total = Math.min(count, room);
        for (let i = 0; i < total; i += 1) {
          const angle = random(0, Math.PI * 2);
          const speed = random(36, 150);
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            r: random(2, 5),
            life: random(0.34, 0.78),
            maxLife: 0.78,
            color
          });
        }
      }

      function addFloater(text, x, y, color = "#17324d") {
        state.floaters.push({ text, x, y, vy: -46, life: 0.95, color });
      }

      function addWaveBurst(x, y, color) {
        state.particles.push({ x, y, vx: 0, vy: 0, r: 8, life: 0.72, maxLife: 0.72, color, ring: true });
      }

      function addCelebrationPieces(x, y, count, finale = false) {
        const colors = finale
          ? ["#ffd166", "#ff9fb7", "#d7c6ff", "#8be8dc", "#fff7c7"]
          : ["#ffd166", "#ff9fb7", "#d9f7ff", "#8be8dc"];
        const room = Math.max(0, 190 - state.particles.length);
        const total = Math.min(count, room);
        for (let i = 0; i < total; i += 1) {
          const angle = random(-Math.PI, 0);
          const speed = random(finale ? 78 : 42, finale ? 190 : 130);
          const shape = Math.random() < 0.42 ? "heart" : Math.random() < 0.76 ? "star" : "dot";
          state.particles.push({
            x: x + random(-22, 22),
            y: y + random(-12, 12),
            vx: Math.cos(angle) * speed + random(-24, 24),
            vy: Math.sin(angle) * speed - random(16, finale ? 84 : 48),
            r: random(finale ? 4 : 3, finale ? 8 : 6),
            life: random(0.78, finale ? 1.45 : 1.08),
            maxLife: finale ? 1.45 : 1.08,
            color: colors[Math.floor(random(0, colors.length))],
            shape,
            angle: random(0, Math.PI * 2),
            spin: random(-4, 4)
          });
        }
      }

      function addLevelCelebration(id) {
        const finale = id === 5;
        addCelebrationPieces(whale.x, whale.y - 18, finale ? 54 : 28, finale);
        addWaveBurst(whale.x, whale.y, finale ? "rgba(255,209,102,0.72)" : "rgba(255,159,183,0.48)");
        addFloater(finale ? "HB Pier" : "Nice Clear", CONFIG.width * 0.5, 212, finale ? "#8a5a00" : "#ff5d7a");
      }

      function addFinalCelebration(victory) {
        const centerY = victory ? 236 : 276;
        addCelebrationPieces(CONFIG.width * 0.5, centerY, victory ? 86 : 42, victory);
        addWaveBurst(CONFIG.width * 0.5, centerY, victory ? "rgba(255,209,102,0.76)" : "rgba(255,159,183,0.5)");
        addFloater(victory ? "ราชินีชายฝั่ง" : "ถึงด่านสุดท้ายแล้ว", CONFIG.width * 0.5, victory ? 150 : 182, victory ? "#8a5a00" : "#0b6f82");
      }

      function updateCelebration(dt) {
        if (state.celebrationTimer <= 0) return;
        state.celebrationTimer = Math.max(0, state.celebrationTimer - dt);
        state.celebrationPulse -= dt;
        if (state.celebrationPulse > 0) return;

        const finale = state.celebrationKind === "victory" || state.celebrationKind === "gate";
        const burstX = finale ? random(84, CONFIG.width - 84) : random(130, CONFIG.width - 130);
        const burstY = finale ? random(118, 250) : random(190, 300);
        addCelebrationPieces(burstX, burstY, finale ? 12 : 7, finale);
        state.celebrationPulse = random(finale ? 0.13 : 0.18, finale ? 0.24 : 0.32);
      }

      function update(dt) {
        state.clock += dt;
        tickMusic();
        updateBackground(dt);
        updateSurface(dt);
        updateParticles(dt);
        updateFloaters(dt);
        updateCelebration(dt);
        state.shake = Math.max(0, state.shake - dt * 26);
        state.flash = Math.max(0, state.flash - dt * 2.8);
        whale.smile = Math.max(0, whale.smile - dt);

        if (state.mode === "levelComplete") {
          state.transitionTimer -= dt;
          if (state.transitionTimer <= 0) nextLevel();
          syncStageChrome();
          return;
        }

        if (state.mode !== "playing") {
          updateWhaleIdle(dt);
          syncStageChrome();
          return;
        }

        state.elapsed += dt;
        state.timeLeft -= dt;
        state.transitionTimer = Math.max(0, state.transitionTimer - dt);
        state.comboTimer -= dt;
        state.feverTimer = Math.max(0, state.feverTimer - dt);
        whale.formTimer = Math.max(0, whale.formTimer - dt);
        whale.shield = Math.max(0, whale.shield - dt);
        whale.invulnerable = Math.max(0, whale.invulnerable - dt);
        if (whale.formTimer <= 0 && whale.form !== "classic") activateForm("classic", 0);
        updateWhaleIdle(dt);
        if (state.comboTimer <= 0 && state.combo) {
          state.combo = 0;
          if (whale.form === "giant") activateForm("classic", 0);
        }

        updateWhale(dt);
        applyMagnet(dt);
        updateSpawns(dt);
        updateEntities(dt);

        if (state.levelScore >= level().goal) completeLevel();
        else if (state.timeLeft <= 0) endGame(false);
        updateHud();
        syncStageChrome();
      }

      function updateWhaleIdle(dt) {
        whale.blink -= dt;
        if (whale.blink <= 0) whale.blink = random(2.2, 4.8);
        whale.trail.unshift({ x: whale.x, y: whale.y, scale: whale.scale, form: whale.form, life: 0.38 });
        whale.trail = whale.trail.filter((p, index) => index < 14 && (p.life -= dt) > 0);
      }

      function updateBackground(dt) {
        for (const bubble of state.bgBubbles) {
          bubble.y -= bubble.speed * dt * (level().id >= 8 ? 1.24 : 1);
          bubble.x += Math.sin(state.clock * bubble.drift + bubble.phase) * dt * 7;
          if (bubble.y < -12) {
            bubble.y = CONFIG.height + 12;
            bubble.x = random(10, CONFIG.width - 10);
          }
        }
      }

      function updateWhale(dt) {
        const keyX = (input.keys.has("ArrowRight") || input.keys.has("KeyD") ? 1 : 0) -
          (input.keys.has("ArrowLeft") || input.keys.has("KeyA") ? 1 : 0);
        const keyY = (input.keys.has("ArrowDown") || input.keys.has("KeyS") ? 1 : 0) -
          (input.keys.has("ArrowUp") || input.keys.has("KeyW") ? 1 : 0);
        const speedBoost = whale.form === "star" ? 1.22 : whale.form === "giant" ? 0.86 : 1;

        if (keyX || keyY) {
          whale.targetX += keyX * 285 * speedBoost * dt;
          whale.targetY += keyY * 242 * speedBoost * dt;
        }

        const currentPush = Math.sin(state.clock * 1.5 + level().id) * level().current * 72;
        whale.targetX += currentPush * dt;
        whale.targetX = clamp(whale.targetX, 42, CONFIG.width - 42);
        whale.targetY = clamp(whale.targetY, CONFIG.safeTop, CONFIG.height - CONFIG.safeBottom);

        const oldX = whale.x;
        const oldY = whale.y;
        const follow = 1 - Math.exp(-10 * speedBoost * dt);
        whale.x += (whale.targetX - whale.x) * follow;
        whale.y += (whale.targetY - whale.y) * follow;
        whale.vx = (whale.x - oldX) / Math.max(dt, 0.001);
        whale.vy = (whale.y - oldY) / Math.max(dt, 0.001);
        whale.faceTilt = clamp(whale.vx * 0.0014, -0.22, 0.22);
      }

      function updateSpawns(dt) {
        const lv = level();
        const fever = state.feverTimer > 0;

        state.spawnTimer -= dt;
        if (state.spawnTimer <= 0) {
          spawnBubble(Math.random() < (fever ? 0.22 : 0.08) ? "gold" : "star");
          state.spawnTimer = Math.max(0.24, random(lv.bubbleGap * 0.75, lv.bubbleGap * 1.12) * (fever ? 0.55 : 1));
        }

        state.inkTimer -= dt;
        if (state.inkTimer <= 0) {
          spawnObstaclePattern();
          state.inkTimer = random(lv.inkGap * 0.72, lv.inkGap * 1.15);
        }

        state.goldTimer -= dt;
        if (state.goldTimer <= 0) {
          spawnBubble("gold");
          state.goldTimer = random(lv.goldGap * 0.78, lv.goldGap * 1.15);
        }

        state.powerTimer -= dt;
        if (state.powerTimer <= 0) {
          const choices = lv.powers;
          spawnBubble(choices[Math.floor(random(0, choices.length))]);
          state.powerTimer = random(lv.powerGap * 0.82, lv.powerGap * 1.18);
        }

        state.heartTimer -= dt;
        if (!state.heartSpawned && state.heartTimer <= 0) {
          spawnBubble("heart");
          state.heartSpawned = true;
        }

        state.cometTimer -= dt;
        if (state.cometTimer <= 0 && lv.powers.includes("comet")) {
          spawnBubble("comet", {
            x: random(30, CONFIG.width - 30),
            y: CONFIG.height + 25,
            vx: random(-70, 70),
            vy: random(-260, -220),
            r: 20
          });
          state.cometTimer = random(8.5, 13);
        }
      }

      function applyMagnet(dt) {
        const magnetic = whale.form === "moon" || whale.form === "star" || state.combo >= 10;
        if (!magnetic) return;
        const radius = whale.form === "star" ? 140 : 112;
        for (const entity of state.entities) {
          if (entity.kind !== "collect" || entity.type === "comet") continue;
          const d = distance(entity.x, entity.y, whale.x, whale.y);
          if (d < radius && d > 2) {
            const pull = (1 - d / radius) * (whale.form === "star" ? 280 : 190) * dt;
            entity.x += (whale.x - entity.x) / d * pull;
            entity.y += (whale.y - entity.y) / d * pull;
          }
        }
      }

      function updateEntities(dt) {
        for (let i = state.entities.length - 1; i >= 0; i -= 1) {
          const entity = state.entities[i];
          entity.age += dt;
          entity.y += entity.vy * dt;
          entity.x += entity.vx * dt + Math.sin(entity.age * entity.wave + entity.phase) * entity.drift * dt;

          if (entity.y < -entity.r - 34 || entity.x < -60 || entity.x > CONFIG.width + 60) {
            state.entities.splice(i, 1);
            continue;
          }

          if (entity.type === "whirlpool" && state.mode === "playing") {
            applyWhirlpoolPull(entity, dt);
          }

          // v3: Near-miss bonus. If an obstacle slides past the narwhal
          // close enough to count as a dodge but doesn't actually hit, give
          // a small +3 and a "Close!" popup, once per entity. Tuned tight
          // (14px window) so the bonus rewards real dodges and doesn't
          // inflate scores when stuff just clusters nearby.
          if (entity.kind === "obstacle" && !entity.nearMissed && whale.invulnerable <= 0) {
            const d = distance(entity.x, entity.y, whale.x, whale.y);
            const hitBand = entity.r + obstacleRadius();
            if (d > hitBand && d < hitBand + 14) {
              entity.nearMissed = true;
              state.score += 3;
              addFloater("Close!", entity.x, entity.y - 6, "#0b6f82");
              playTone(720, 0.04, "triangle", 0.022);
            }
          }

          if (entity.kind === "obstacle" && whale.invulnerable <= 0 && hitsWhale(entity, obstacleRadius())) {
            state.entities.splice(i, 1);
            hitObstacle(entity);
            continue;
          }

          if (entity.kind === "collect" && hitsWhale(entity, collectRadius())) {
            state.entities.splice(i, 1);
            collectBubble(entity);
          }
        }
      }

      function applyWhirlpoolPull(entity, dt) {
        const d = distance(entity.x, entity.y, whale.x, whale.y);
        if (d > 118 || d < 4 || whale.shield > 0) return;
        const pull = (1 - d / 118) * (26 + level().id * 4) * dt;
        whale.targetX += (entity.x - whale.x) / d * pull;
        whale.targetY += (entity.y - whale.y) / d * pull;
      }

      function collectRadius() {
        return 31 + (whale.scale - 1) * 30 + (whale.form === "star" ? 10 : 0) + (state.combo >= 10 ? 6 : 0);
      }

      function obstacleRadius() {
        return 24 + (whale.scale - 1) * 12;
      }

      function hitsWhale(entity, bodyRadius) {
        const hornReach = whale.form === "star" ? 33 : 22;
        const hornX = whale.x + 26 * whale.scale;
        const hornY = whale.y - 18 * whale.scale;
        const bodyHit = distance(entity.x, entity.y, whale.x, whale.y) < entity.r + bodyRadius;
        const hornHit = distance(entity.x, entity.y, hornX, hornY) < entity.r + hornReach;
        const mirror = whale.form === "mirror" && whale.trail[6] &&
          distance(entity.x, entity.y, whale.trail[6].x, whale.trail[6].y) < entity.r + 26;
        return bodyHit || hornHit || mirror;
      }

      function hitObstacle(entity) {
        if (whale.shield > 0) {
          whale.shield = 0;
          whale.invulnerable = 0.85;
          activateForm("classic", 0);
          state.shake = 6;
          addParticles(entity.x, entity.y, "rgba(217, 247, 255, 0.9)", 24);
          addFloater("โล่แตก", entity.x, entity.y, "#0b6f82");
          playTone(260, 0.08, "triangle", 0.03);
          return;
        }

        state.noHit = false;
        state.combo = 0;
        state.comboTimer = 0;
        state.shake = 16;
        state.flash = 1;
        whale.smile = 0;
        if (whale.form !== "classic") activateForm("classic", 0);
        addParticles(entity.x, entity.y, "rgba(41, 73, 101, 0.78)", 28);
        playTone(120, 0.08, "sawtooth", 0.025);
        state.lives = Math.max(0, state.lives - 1);
        if (state.lives <= 0) {
          addFloater("หัวใจหมด", entity.x, entity.y, "#17324d");
          endGame(false, "หัวใจหมด");
        } else {
          whale.invulnerable = 1.05;
          addFloater(`-${1} Heart`, entity.x, entity.y, "#17324d");
        }
      }

      function collectBubble(entity) {
        whale.smile = 0.56;
        if (entity.type === "heart") {
          const beforeLives = state.lives;
          state.lives = Math.min(3, state.lives + 1);
          addFloater(beforeLives < 3 ? "+1 Heart" : "Heart Max", entity.x, entity.y, "#ff5d7a");
          addParticles(entity.x, entity.y, "rgba(255, 93, 122, 0.92)", 24);
          playTone(760, 0.09, "triangle", 0.035);
          return;
        }

        state.combo += 1;
        state.comboTimer = 2.45;
        state.bestCombo = Math.max(state.bestCombo, state.combo);

        let gain = entity.value + Math.floor(Math.min(state.combo, 18) * 0.85);
        const multiplier = whale.form === "giant" ? 1.12 : whale.form === "star" ? 1.34 : state.feverTimer > 0 ? 1.1 : 1;

        if (entity.type === "pearl") {
          state.timeLeft = Math.min(level().duration + 8, state.timeLeft + 3);
          addFloater("+3 วิ", entity.x, entity.y, "#0b6f82");
          activateForm("classic", Math.max(whale.formTimer, 0));
        } else if (entity.type === "grow") {
          activateForm("giant", 7.5);
          addFloater("Giant", entity.x, entity.y, "#8a5a00");
        } else if (entity.type === "moon") {
          activateForm("moon", 8);
          addFloater("Magnet", entity.x, entity.y, "#4452b8");
        } else if (entity.type === "shield") {
          whale.shield = 3;
          activateForm("classic", 0);
          addFloater("Shield 3 วิ", entity.x, entity.y, "#0b6f82");
        } else if (entity.type === "prism") {
          activateForm("star", 8.5);
          addFloater("Starhorn", entity.x, entity.y, "#8a5a00");
        } else if (entity.type === "mirror") {
          activateForm("mirror", 6.5);
          addFloater("Mirror", entity.x, entity.y, "#4452b8");
        } else if (entity.type === "comet") {
          state.feverTimer = 5.2;
          activateForm("star", Math.max(whale.formTimer, 5.2));
          addFloater("Fever", entity.x, entity.y, "#8a5a00");
          addWaveBurst(entity.x, entity.y, "rgba(255,209,102,0.7)");
        }

        if (entity.type === "gold" && Math.random() < 0.45) splitGold(entity);
        gain = Math.floor(gain * multiplier);
        state.score += gain;
        state.levelScore += gain;
        addFloater(`+${gain}`, entity.x, entity.y - 8, entity.type === "gold" || whale.form === "star" ? "#8a5a00" : "#0b6f82");
        burstFor(entity);

        if (state.combo > 0 && state.combo % 5 === 0) {
          addFloater(`Combo x${state.combo}`, whale.x, whale.y - 58, "#ff7b9b");
          addWaveBurst(whale.x, whale.y, state.combo % 10 === 0 ? "rgba(255,209,102,0.65)" : "rgba(255,159,183,0.5)");
          if (state.combo % 10 === 0) state.feverTimer = Math.max(state.feverTimer, 3.2);
          playTone(820, 0.08, "triangle", 0.032);
        } else {
          playTone(entity.type === "gold" ? 620 : 460, 0.055, "sine", 0.028);
        }
      }

      function splitGold(entity) {
        for (let i = 0; i < 5; i += 1) {
          spawnBubble("mini", {
            x: entity.x + random(-12, 12),
            y: entity.y + random(-8, 8),
            vx: random(-55, 55),
            vy: random(-112, -68),
            r: 11,
            drift: random(6, 18)
          });
        }
      }

      function burstFor(entity) {
        const colors = {
          gold: "rgba(255, 209, 102, 0.95)",
          pearl: "rgba(255, 159, 183, 0.9)",
          heart: "rgba(255, 93, 122, 0.92)",
          grow: "rgba(255, 209, 102, 0.88)",
          moon: "rgba(150, 170, 255, 0.9)",
          shield: "rgba(217, 247, 255, 0.95)",
          prism: "rgba(255, 240, 140, 0.96)",
          mirror: "rgba(215, 198, 255, 0.96)",
          comet: "rgba(255, 209, 102, 0.96)"
        };
        addParticles(entity.x, entity.y, colors[entity.type] || "rgba(217, 247, 255, 0.92)", entity.type === "gold" || entity.type === "comet" ? 28 : 16);
      }

      function activateForm(form, seconds) {
        if (form === "classic") {
          if (seconds > 0) return;
          whale.form = "classic";
          whale.formTimer = 0;
          whale.scale = 1;
          return;
        }
        whale.form = form;
        whale.formTimer = Math.max(whale.formTimer, seconds);
        whale.scale = form === "giant" ? 1.32 : form === "star" ? 1.08 : 1;
        state.flash = Math.max(state.flash, 0.34);
      }

      function updateParticles(dt) {
        for (let i = state.particles.length - 1; i >= 0; i -= 1) {
          const p = state.particles[i];
          p.life -= dt;
          if (!p.ring) {
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            p.vy += 50 * dt;
            if (p.spin) p.angle += p.spin * dt;
          } else {
            p.r += 150 * dt;
          }
          if (p.life <= 0) state.particles.splice(i, 1);
        }
      }

      function updateFloaters(dt) {
        for (let i = state.floaters.length - 1; i >= 0; i -= 1) {
          const f = state.floaters[i];
          f.life -= dt;
          f.y += f.vy * dt;
          if (f.life <= 0) state.floaters.splice(i, 1);
        }
      }

      function render() {
        ctx.save();
        const shakeX = state.shake ? random(-state.shake, state.shake) : 0;
        const shakeY = state.shake ? random(-state.shake * 0.7, state.shake * 0.7) : 0;
        ctx.translate(shakeX, shakeY);
        drawBackground();
        drawCelebrationBackdrop();
        drawEntities();
        drawParticles();
        drawWhaleTrail();
        drawWhale();
        drawSurface();
        drawFloaters();
        drawCanvasHud();
        if (state.flash > 0) drawFlash();
        drawTransition();
        ctx.restore();
      }

      function drawBackground() {
        const lv = level();
        // v4: split background into SKY (above horizon) and WATER (below).
        // Sky gets a bright dawn/coastal gradient (peach → light blue) with
        // a sun disc. Water uses the level's mid/dark palette colors so
        // each level still has its own underwater mood.
        const horizon = CONFIG.horizonY;
        const skyGrad = ctx.createLinearGradient(0, 0, 0, horizon);
        // Finale: brand brass-on-navy sunset; other levels: peachy dawn → cyan
        const isFinale = lv.id === 5;
        skyGrad.addColorStop(0, isFinale ? "#fff2cc" : "#fff5e0");
        skyGrad.addColorStop(0.55, isFinale ? "#f4d68a" : "#d6ecff");
        skyGrad.addColorStop(1, isFinale ? "#b8995b" : "#a6d3e8");
        ctx.fillStyle = skyGrad;
        ctx.fillRect(0, 0, CONFIG.width, horizon);

        // Sun / soft glow disc, lower-right of sky region
        ctx.save();
        ctx.globalAlpha = 0.65;
        const sunX = CONFIG.width * 0.78;
        const sunY = horizon - 64;
        const sunGrad = ctx.createRadialGradient(sunX, sunY, 4, sunX, sunY, 52);
        sunGrad.addColorStop(0, isFinale ? "rgba(255,232,170,1)" : "rgba(255,236,196,1)");
        sunGrad.addColorStop(1, isFinale ? "rgba(255,232,170,0)" : "rgba(255,236,196,0)");
        ctx.fillStyle = sunGrad;
        ctx.beginPath();
        ctx.arc(sunX, sunY, 52, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // Cloud strips drifting slowly across the sky (state.clock-based)
        ctx.save();
        ctx.fillStyle = isFinale ? "rgba(255,242,204,0.62)" : "rgba(255,255,255,0.75)";
        for (let i = 0; i < 3; i += 1) {
          const cx = ((state.clock * 6) + i * 220) % (CONFIG.width + 200) - 80;
          const cy = 28 + i * 26;
          ctx.beginPath();
          ctx.ellipse(cx, cy, 38, 9, 0, 0, Math.PI * 2);
          ctx.ellipse(cx + 22, cy - 4, 26, 7, 0, 0, Math.PI * 2);
          ctx.ellipse(cx - 18, cy + 2, 22, 6, 0, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();

        // Water gradient — starts at horizon, uses level's mid + dark palette
        const waterGrad = ctx.createLinearGradient(0, horizon, 0, CONFIG.height);
        waterGrad.addColorStop(0, lv.palette[1]);
        waterGrad.addColorStop(0.55, lv.palette[1]);
        waterGrad.addColorStop(1, lv.palette[2]);
        ctx.fillStyle = waterGrad;
        ctx.fillRect(0, horizon, CONFIG.width, CONFIG.height - horizon);

        // Foam / horizon line: small wave shape sitting RIGHT at the boundary
        ctx.save();
        ctx.fillStyle = "rgba(255,255,255,0.55)";
        ctx.beginPath();
        ctx.moveTo(0, horizon + 2);
        for (let x = 0; x <= CONFIG.width; x += 8) {
          const yy = horizon + Math.sin((x + state.clock * 40) * 0.06) * 2;
          ctx.lineTo(x, yy);
        }
        ctx.lineTo(CONFIG.width, horizon + 6);
        ctx.lineTo(0, horizon + 6);
        ctx.closePath();
        ctx.fill();
        ctx.restore();

        if (state.feverTimer > 0 || lv.id === 5) {
          ctx.save();
          ctx.globalAlpha = lv.id === 5 ? 0.18 : 0.12;
          for (let i = 0; i < 5; i += 1) {
            ctx.fillStyle = i % 2 ? "#ffd166" : "#d7c6ff";
            ctx.beginPath();
            ctx.ellipse(40 + i * ((CONFIG.width - 80) / 4), 62 + Math.sin(state.clock * 1.1 + i) * 14, 70, 12, 0.15, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.restore();
        }

        ctx.save();
        ctx.globalAlpha = 0.22;
        drawWave(64, 12, "#ffffff", 1.2);
        drawWave(138, 16, "#ffffff", 0.8);
        drawWave(526, 18 + lv.current * 24, "#0b6f82", 0.35 + lv.current);
        ctx.restore();

        if (lv.current > 0.12) drawCurrentArrows(lv.current);
        drawBrandWatermark();

        for (const bubble of state.bgBubbles) {
          ctx.save();
          ctx.globalAlpha = bubble.alpha;
          ctx.strokeStyle = "#ffffff";
          ctx.lineWidth = 1.4;
          ctx.beginPath();
          ctx.arc(bubble.x, bubble.y, bubble.r, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        }

        ctx.save();
        ctx.globalAlpha = 0.08;
        ctx.fillStyle = "#17324d";
        ctx.beginPath();
        ctx.ellipse(64, 584, 74, 18, -0.08, 0, Math.PI * 2);
        ctx.ellipse(CONFIG.width - 88, 588, 106, 20, 0.05, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawBrandWatermark() {
        ctx.save();
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = "900 24px Noto Sans Thai, Segoe UI, sans-serif";
        ctx.globalAlpha = 0.2;
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 4;
        ctx.strokeText("Narwhal Thai Table", CONFIG.width / 2, 214);
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = "#0b6f82";
        ctx.fillText("Narwhal Thai Table", CONFIG.width / 2, 214);
        ctx.restore();
      }

      // ===== v4: surface (above-water) entities =====
      // Surfers, boats, jet skis, and birds. They drift horizontally
      // across the sky band. Boats + jet skis project a danger column
      // straight down into the water (narwhal must dive to avoid).
      // Surfers project a "friendly" column — narwhal can bonk one and
      // the surfer comically tumbles into the water with a soft yelp.
      // Birds soar high and drop a shield pickup at a random X.

      function spawnSurfaceEntity(type) {
        const fromLeft = Math.random() < 0.5;
        const dir = fromLeft ? 1 : -1;
        const e = {
          type,
          x: fromLeft ? -50 : CONFIG.width + 50,
          y: 0,
          vx: 0,
          width: 0,
          faceLeft: !fromLeft,  // boats/jet skis face away from spawn side
          age: 0,
          hasFallen: false,
          hasDropped: false,
          dropAt: 0
        };
        if (type === "surfer") {
          e.y = CONFIG.horizonY - 14;
          e.vx = dir * 72;
          e.width = 30;
        } else if (type === "boat") {
          e.y = CONFIG.horizonY - 18;
          e.vx = dir * 95;
          e.width = 72;
        } else if (type === "jetski") {
          e.y = CONFIG.horizonY - 12;
          e.vx = dir * 130;
          e.width = 38;
        } else if (type === "bird") {
          e.y = 28 + Math.random() * 78;
          e.vx = dir * 64;
          e.width = 24;
          e.dropAt = random(80, CONFIG.width - 80);
        }
        state.surfaceEntities.push(e);
      }

      // Pick which surface entity to spawn next. Higher levels see boats /
      // jet skis more often; level 1 is mostly surfers + a few birds so
      // the player can learn the new mechanic gently.
      function chooseSurfaceType() {
        const id = level().id;
        const roll = Math.random();
        if (id === 1) return roll < 0.55 ? "surfer" : roll < 0.78 ? "bird" : roll < 0.92 ? "jetski" : "boat";
        if (id === 2) return roll < 0.42 ? "surfer" : roll < 0.62 ? "bird" : roll < 0.85 ? "jetski" : "boat";
        if (id === 3) return roll < 0.34 ? "surfer" : roll < 0.52 ? "bird" : roll < 0.78 ? "jetski" : "boat";
        if (id === 4) return roll < 0.28 ? "surfer" : roll < 0.44 ? "bird" : roll < 0.72 ? "jetski" : "boat";
        return roll < 0.22 ? "surfer" : roll < 0.38 ? "bird" : roll < 0.68 ? "jetski" : "boat";
      }

      function updateSurface(dt) {
        state.surfaceTimer -= dt;
        if (state.surfaceTimer <= 0 && state.mode === "playing") {
          spawnSurfaceEntity(chooseSurfaceType());
          // Spawn cadence: ~6-9s base, tightens with level (so finale feels busy)
          const id = level().id;
          state.surfaceTimer = random(5.5, 8.5) - id * 0.3;
        }

        for (let i = state.surfaceEntities.length - 1; i >= 0; i -= 1) {
          const e = state.surfaceEntities[i];
          e.age += dt;
          e.x += e.vx * dt;

          // Surfer that's already been bumped tumbles into the sea
          if (e.type === "surfer" && e.hasFallen) {
            e.y += 90 * dt;
            e.vx *= 0.94;
            if (e.y > CONFIG.height + 30) {
              state.surfaceEntities.splice(i, 1);
              continue;
            }
          }

          // Off-screen cleanup
          if (e.x < -90 || e.x > CONFIG.width + 90) {
            state.surfaceEntities.splice(i, 1);
            continue;
          }

          // Bird drop point — spawn a shield pickup that falls into the sea
          if (e.type === "bird" && !e.hasDropped) {
            const past = (e.vx > 0 && e.x >= e.dropAt) || (e.vx < 0 && e.x <= e.dropAt);
            if (past) {
              e.hasDropped = true;
              state.entities.push({
                type: "shield",
                kind: "collect",
                x: e.x,
                y: CONFIG.horizonY + 4,
                r: 22,
                vx: 0,
                vy: 60,
                drift: 0,
                wave: 0,
                phase: 0,
                age: 0,
                value: valueFor("shield"),
                fromBird: true
              });
              playTone(540, 0.05, "sine", 0.02);
            }
          }

          // Collision with the narwhal — only when the narwhal is swimming
          // shallow (within surfaceDangerDepth of the horizon).
          if (e.type !== "bird" && !e.hasFallen && whale.invulnerable <= 0 && state.mode === "playing") {
            const halfW = e.width / 2;
            const inColumn = whale.x > e.x - halfW && whale.x < e.x + halfW;
            const inDepth = whale.y < CONFIG.horizonY + CONFIG.surfaceDangerDepth;
            if (inColumn && inDepth) {
              if (e.type === "surfer") {
                // Friendly bump: surfer flips, narwhal gets a tiny score
                // and a soft "Sorry!" cue. No life lost.
                e.hasFallen = true;
                e.vx = e.vx * 0.4 + (Math.random() < 0.5 ? -1 : 1) * 18;
                playTone(820, 0.16, "triangle", 0.025);
                window.setTimeout(() => playTone(580, 0.13, "triangle", 0.020), 80);
                addFloater("Sorry!", e.x, CONFIG.horizonY + 22, "#ff5d7a");
                state.score += 1; // tiny nudge, not gameable
              } else {
                // Boat / jet ski — full obstacle hit
                state.surfaceEntities.splice(i, 1);
                hitObstacle({ type: e.type, x: e.x, y: CONFIG.horizonY + 30, r: 24 });
                continue;
              }
            }
          }
        }
      }

      function drawSurface() {
        for (const e of state.surfaceEntities) {
          ctx.save();
          ctx.translate(e.x, e.y);
          if (e.faceLeft) ctx.scale(-1, 1);
          if (e.type === "surfer") drawSurfer(e);
          else if (e.type === "boat") drawBoat(e);
          else if (e.type === "jetski") drawJetski(e);
          else if (e.type === "bird") drawBird(e);
          ctx.restore();
        }
      }

      function drawSurfer(e) {
        const bob = Math.sin(e.age * 4) * 1.4;
        // Surfboard (cream with brass rail)
        ctx.fillStyle = "#fff5e0";
        ctx.beginPath();
        ctx.ellipse(0, bob, 22, 4, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#d4b36a";
        ctx.lineWidth = 1.1;
        ctx.stroke();
        if (e.hasFallen) {
          // mid-air tumble — rotate the figure
          ctx.rotate(Math.sin(e.age * 7) * 0.6);
        }
        // Body
        ctx.fillStyle = "#3a78b3";
        ctx.beginPath();
        ctx.ellipse(2, bob - 11, 4, 8, 0, 0, Math.PI * 2);
        ctx.fill();
        // Head
        ctx.fillStyle = "#f4d68a";
        ctx.beginPath();
        ctx.arc(2, bob - 20, 3.6, 0, Math.PI * 2);
        ctx.fill();
        // Arms in T-pose for balance
        ctx.strokeStyle = "#3a78b3";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-3, bob - 11); ctx.lineTo(-7, bob - 7);
        ctx.moveTo(7, bob - 11); ctx.lineTo(11, bob - 7);
        ctx.stroke();
      }

      function drawBoat(e) {
        const bob = Math.sin(e.age * 2.2) * 1.2;
        // Hull (deep navy)
        ctx.fillStyle = "#26456f";
        ctx.beginPath();
        ctx.moveTo(-34, bob);
        ctx.lineTo(30, bob);
        ctx.lineTo(22, bob + 9);
        ctx.lineTo(-28, bob + 9);
        ctx.closePath();
        ctx.fill();
        // Hull stripe (brass)
        ctx.fillStyle = "#d4b36a";
        ctx.fillRect(-30, bob - 2, 56, 2);
        // Cabin
        ctx.fillStyle = "#fff5e0";
        ctx.fillRect(-12, bob - 16, 22, 16);
        // Window
        ctx.fillStyle = "#0b1f33";
        ctx.fillRect(-9, bob - 13, 18, 6);
        // Mast + flag
        ctx.strokeStyle = "#0b1f33";
        ctx.lineWidth = 1.4;
        ctx.beginPath();
        ctx.moveTo(-12, bob - 16); ctx.lineTo(-12, bob - 28);
        ctx.stroke();
        ctx.fillStyle = "#d4b36a";
        ctx.beginPath();
        ctx.moveTo(-12, bob - 28); ctx.lineTo(-4, bob - 26); ctx.lineTo(-12, bob - 24);
        ctx.closePath();
        ctx.fill();
        // Bow wake
        ctx.fillStyle = "rgba(255,255,255,0.7)";
        ctx.beginPath();
        ctx.ellipse(34, bob + 9, 8, 3, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawJetski(e) {
        const bob = Math.sin(e.age * 5) * 1.6;
        // Body — bright coral so it stands out as danger
        ctx.fillStyle = "#ff6b6b";
        ctx.beginPath();
        ctx.moveTo(-18, bob);
        ctx.lineTo(16, bob - 2);
        ctx.lineTo(18, bob + 7);
        ctx.lineTo(-16, bob + 9);
        ctx.closePath();
        ctx.fill();
        // Seat
        ctx.fillStyle = "#0b1f33";
        ctx.fillRect(-8, bob - 4, 14, 4);
        // Handlebar
        ctx.strokeStyle = "#0b1f33";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(10, bob - 2); ctx.lineTo(10, bob - 10);
        ctx.stroke();
        // Rider — helmet + torso
        ctx.fillStyle = "#0b1f33";
        ctx.beginPath();
        ctx.arc(0, bob - 13, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#5fa3c8";
        ctx.fillRect(-3, bob - 9, 6, 6);
        // Spray fan behind
        ctx.fillStyle = "rgba(255,255,255,0.65)";
        ctx.beginPath();
        ctx.arc(-22, bob + 7, 4, 0, Math.PI * 2);
        ctx.arc(-27, bob + 9, 3, 0, Math.PI * 2);
        ctx.arc(-31, bob + 11, 2, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawBird(e) {
        const flap = Math.sin(e.age * 8) * 3;
        ctx.strokeStyle = "#0b1f33";
        ctx.lineWidth = 1.8;
        ctx.beginPath();
        ctx.moveTo(-12, 4 - flap);
        ctx.lineTo(0, -2 + flap * 0.4);
        ctx.lineTo(12, 4 - flap);
        ctx.stroke();
        ctx.fillStyle = "#0b1f33";
        ctx.beginPath();
        ctx.ellipse(0, 0, 4, 2.2, 0, 0, Math.PI * 2);
        ctx.fill();
        if (!e.hasDropped) {
          // shield held under the bird, brass + cream
          ctx.fillStyle = "#5fa3c8";
          ctx.beginPath();
          ctx.arc(0, 8, 5.5, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "#fff5e0";
          ctx.lineWidth = 1.4;
          ctx.beginPath();
          ctx.arc(0, 8, 5.5, 0, Math.PI * 2);
          ctx.stroke();
        }
      }

      function drawCelebrationBackdrop() {
        const activeFinal = state.mode === "victory" || state.celebrationKind === "victory";
        const finalTry = state.mode === "gameover" && (level().id === 5 || state.highestLevel >= 5);
        if (!activeFinal && !finalTry && state.mode !== "levelComplete") return;

        ctx.save();
        if (activeFinal) {
          const glow = 0.42 + Math.sin(state.clock * 2.2) * 0.08;
          ctx.globalAlpha = glow;
          for (let i = 0; i < 5; i += 1) {
            ctx.fillStyle = i % 2 ? "#ff9fb7" : "#ffd166";
            ctx.beginPath();
            ctx.ellipse(72 + i * ((CONFIG.width - 144) / 4), 118 + Math.sin(state.clock * 1.4 + i) * 18, 82, 14, -0.18, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.globalAlpha = 0.78;
          drawCrown(CONFIG.width * 0.5, 132);
        } else if (finalTry) {
          ctx.globalAlpha = 0.18;
          ctx.fillStyle = "#ffffff";
          ctx.beginPath();
          ctx.ellipse(CONFIG.width * 0.5, 156, 150, 28, 0, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.globalAlpha = 0.2 + Math.sin(state.clock * 5) * 0.04;
          ctx.fillStyle = "#ffffff";
          ctx.beginPath();
          ctx.ellipse(CONFIG.width * 0.5, 284, 116, 30, 0, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      function drawWave(y, amplitude, color, speed) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        for (let x = 0; x <= CONFIG.width; x += 12) {
          const waveY = y + Math.sin(x * 0.028 + state.clock * speed) * amplitude;
          ctx.lineTo(x, waveY);
        }
        ctx.strokeStyle = color;
        ctx.lineWidth = 4;
        ctx.stroke();
      }

      function drawCurrentArrows(strength) {
        ctx.save();
        ctx.globalAlpha = 0.18 + strength * 0.25;
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 2;
        for (let y = 210; y < 500; y += 70) {
          const dir = Math.sin(state.clock * 1.5 + level().id) > 0 ? 1 : -1;
          const x = dir > 0 ? 58 : CONFIG.width - 58;
          ctx.beginPath();
          ctx.moveTo(x, y);
          ctx.lineTo(x + dir * 46, y);
          ctx.moveTo(x + dir * 46, y);
          ctx.lineTo(x + dir * 32, y - 9);
          ctx.moveTo(x + dir * 46, y);
          ctx.lineTo(x + dir * 32, y + 9);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawEntities() {
        for (const entity of state.entities) {
          if (entity.kind === "obstacle") drawObstacle(entity);
          else drawBubble(entity);
        }
      }

      function drawBubble(entity) {
